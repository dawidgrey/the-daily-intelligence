  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/#webpage","name":"The Daily Intelligence — 2026-07-21","url":"https://dailyintelligence.lacbgrey.com.au/","description":"Today’s issue follows AI beyond the demo: OpenAI reports failures in long-running autonomous work, Anthropic tests language models on robots, and NVIDIA brings a compact world model to edge hardware. The practical theme is control — over agent actions, subscription costs, hiring decisions, information bias, and the energy required to make AI useful at scale.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-07-20T20:00:00Z","dateModified":"2026-07-20T20:06:20Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://openai.com/index/safety-alignment-long-horizon-models","name":"OpenAI says long-running agents exposed failures its tests had missed","description":"OpenAI says a model designed for long autonomous tasks showed unwanted behaviour during limited internal use that existing pre-deployment evaluations had not caught. The company paused access, built new long-horizon evaluations and trajectory monitoring, then restored limited access with stronger controls."},{"@type":"ListItem","position":2,"url":"https://www.anthropic.com/research/claude-plays-robotics","name":"Anthropic finds robot performance depends heavily on the control layer","description":"Anthropic tested language models on simulated and physical robots, from pendulum control to navigation and object manipulation. Models mostly struggled when commanding joints directly, but newer systems performed much better when supervising pretrained controllers or using higher-level orientation tools."},{"@type":"ListItem","position":3,"url":"https://huggingface.co/blog/nvidia/cosmos3edge","name":"NVIDIA releases a 4B world model for robots and edge devices","description":"NVIDIA has released Cosmos 3 Edge, a four-billion-parameter open world model intended to help robots and vision agents interpret scenes, anticipate change, and reason on memory-constrained edge hardware. The release is available through the Cosmos 3 repository on Hugging Face."},{"@type":"ListItem","position":4,"url":"https://support.claude.com/en/articles/15424964-claude-fable-5-on-your-plan","name":"Claude Fable 5 moves to different limits across paid plans","description":"From July 20, Fable 5 is included within regular weekly limits for Max and premium Team or legacy Enterprise seats, with up to half of that weekly allowance usable on the model. Pro and standard Team seats now use pay-as-you-go credits for Fable 5 after the earlier promotion ended."},{"@type":"ListItem","position":5,"url":"https://www.anthropic.com/news/rare-disease-research-grants","name":"Anthropic offers rare-disease researchers up to $50,000 in Claude credits","description":"Anthropic has opened a focused AI for Science grant call for rare genetic diseases. Accepted basic-research teams and early-stage biotechnology companies can receive up to $50,000 in Claude credits over six months and join a community working on related scientific problems."},{"@type":"ListItem","position":6,"url":"https://www.technologyreview.com/2026/07/20/1140655/ai-biases-hiring-humans/","name":"A hiring study finds LLMs can form stereotypes from limited feedback","description":"In a simulated hiring game, researchers found that language models quickly generalised from early outcomes and steered fictional demographic groups into different jobs even though all groups had equal success rates. The models stereotyped more strongly than participants in the earlier human study, while diversity incentives and relevant individual information reduced the effect."},{"@type":"ListItem","position":7,"url":"https://apnews.com/article/artificial-intelligence-chatbots-censorship-bias-free-speech-fed8fdbf90751c10fe77b77832e0ffba","name":"Studies trace chatbot blind spots to restricted information environments","description":"AP reports on research showing that major chatbots can avoid criticism of restrictive leaders or governments when their training information has been shaped by censorship and repeated state narratives. Researchers warn that models may treat many copies of one controlled account as independent evidence."},{"@type":"ListItem","position":8,"url":"https://ourworldindata.org/how-much-energy-do-data-centers-and-artificial-intelligence-use","name":"Our World in Data separates AI energy facts from headline estimates","description":"A new evidence review examines both total electricity demand from data centres and the energy used by individual AI queries. It stresses that company disclosure remains limited, inference probably dominates training over time, and per-query figures vary greatly by model, hardware, workload, and data-centre overhead."},{"@type":"ListItem","position":9,"url":"https://ampcode.com/news/meet-puck","name":"Amp introduces Puck to launch and coordinate coding agents","description":"Amp has introduced Puck, an experimental assistant available across ampcode.com that can find past threads, create projects, launch agents into isolated workspaces, and coordinate parallel investigations. Users can ask it to turn a bug report or failing build into one or more agent tasks."},{"@type":"ListItem","position":10,"url":"https://deepmind.google/models/gemma/gemmaverse/cue-ai/","name":"Cue cuts voice-agent delay by polishing speech locally with Gemma 4","description":"A Google DeepMind case study says desktop voice agent Cue moved its speech-polishing step to Gemma 4 E4B running locally through Ollama. On its Apple-silicon benchmark, Cue reports median latency fell from 876 to 488 milliseconds, usage rose about 30%, and marginal inference cost for that step dropped to zero."},{"@type":"ListItem","position":11,"url":"https://github.com/AstrBotDevs/AstrBot","name":"AstrBotDevs/AstrBot: a cross-platform agent assistant framework","description":"AstrBot is a Python-based agent assistant and development framework with about 37,000 GitHub stars. It connects multiple language models, plugins, and messaging platforms, with an active contributor base and frequent releases."},{"@type":"ListItem","position":12,"url":"https://github.com/vercel-labs/deepsec","name":"vercel-labs/deepsec: coding agents that probe a codebase for vulnerabilities","description":"Deepsec is a roughly 6,000-star security harness that uses coding agents to investigate vulnerabilities in a codebase. Recent work includes configurable reasoning levels and a fix for unbounded memory growth during sandbox downloads."},{"@type":"ListItem","position":13,"url":"https://github.com/microsoft/Ontology-Playground","name":"microsoft/Ontology-Playground: visual tools for designing shared knowledge models","description":"Ontology Playground is a static, open-source web application for learning about ontologies, exploring templates, visually designing knowledge models, and exporting them as RDF/XML. The project has about 1,600 GitHub stars and is designed to work without a backend."}]}}]}</script>
