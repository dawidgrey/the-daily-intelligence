  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/#webpage","name":"The Daily Intelligence — 2026-07-13","url":"https://dailyintelligence.lacbgrey.com.au/","description":"Today's issue tracks a useful turn in AI: less magic, more operating detail. Agent tools are expanding into browsers and office workflows, while new measurements show why memory, token overhead, small models, and hardware-aware design now matter as much as raw model capability.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-07-12T20:00:00Z","dateModified":"2026-07-12T20:04:33Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://code.claude.com/docs/en/desktop#browse-external-sites","name":"Claude Code's browser mode lets the agent read, click, and type on external websites","description":"Anthropic added an integrated browser to Claude Code so the coding agent can open external sites, read documentation, click, and type inside a clean browser profile. The feature includes classifiers for write actions, blocks purchases, account creation, and CAPTCHA bypasses without consent, and can be restricted by organization allowlists."},{"@type":"ListItem","position":2,"url":"https://systima.ai/blog/claude-code-vs-opencode-token-overhead","name":"A token audit finds Claude Code starts far heavier than OpenCode","description":"Systima measured Claude Code and OpenCode at the API boundary and found Claude Code sent about 33,000 tokens before a simple user prompt, versus about 7,000 for OpenCode. The study also found real projects, MCP servers, and subagents can multiply baseline token costs, though Claude Code's tool batching can reduce total turns on some tasks."},{"@type":"ListItem","position":3,"url":"https://the-decoder.com/ai-agents-win-at-slay-the-spire-2-after-researchers-replace-growing-chat-logs-with-structured-memory/","name":"AgenticSTS shows structured memory can beat ever-growing chat logs","description":"Researchers behind AgenticSTS replaced a growing agent transcript with five organized memory layers for the game Slay the Spire 2. The approach kept prompts around 5,000 tokens, won 6 of 10 low-difficulty runs, and used far fewer tokens than public agents that kept resending the whole game history."},{"@type":"ListItem","position":4,"url":"https://claude.com/blog/how-people-are-using-claude-cowork","name":"Anthropic says Claude Cowork is mostly doing the office work around the work","description":"Anthropic's analysis of 1.2 million anonymized Claude Cowork sessions found that business operations and text creation account for roughly half of usage. Common tasks include compiling status updates, creating onboarding checklists, reconciling spreadsheets, drafting documents, and preparing presentations."},{"@type":"ListItem","position":5,"url":"https://www.neatcontext.com/","name":"NeatContext pitches local team knowledge as the missing layer for better LLM answers","description":"NeatContext is a local-first desktop workspace that connects team profiles, local folders, runbooks, and read-only MCP tools to the LLMs a user already has. Its examples focus on operational troubleshooting where internal context changes the answer from a generic checklist to a specific safe action."},{"@type":"ListItem","position":6,"url":"https://techcrunch.com/2026/07/10/meta-removes-controversial-ai-feature-on-instagram-after-backlash/","name":"Meta removes an Instagram AI image feature after backlash over using public photos","description":"Meta removed a Muse Image feature that let users generate images referencing public Instagram accounts by @-mentioning them. The company said the feature 'missed the mark' after criticism that people were not alerted when their public photos could be used this way."},{"@type":"ListItem","position":7,"url":"https://developer.nvidia.com/blog/ai-model-co-design-hardware-friendly-llm-design/","name":"NVIDIA explains how LLM architecture choices affect inference cost and speed","description":"NVIDIA published a technical guide to hardware-friendly LLM design, covering transformer dimensions, GPU tile alignment, NVFP4 quantization, expert parallelism, and trade-offs between throughput and responsiveness. The post argues that model architecture should be designed with deployment hardware in mind from the beginning."},{"@type":"ListItem","position":8,"url":"https://huggingface.co/blog/native-speed-vllm-transformers-backend","name":"Hugging Face says Transformers models can now reach native-speed vLLM serving","description":"Hugging Face says the Transformers modeling backend in vLLM now meets or beats native vLLM implementations on several Qwen3 benchmarks. The update uses runtime analysis and layer fusions so model authors can serve many Transformers models through vLLM without writing custom inference ports."},{"@type":"ListItem","position":9,"url":"https://www.theregister.com/ai-and-ml/2026/07/11/ai-customers-are-coming-around-to-the-idea-that-small-is-beautiful/5268070","name":"The Register argues smaller, specialized models are becoming the enterprise AI default","description":"The Register reports that Microsoft, Amazon, and Google are leaning harder into smaller domain-specific models for common tasks, rather than using frontier models for everything. The piece frames this as a cost, latency, and control shift as companies learn which AI tasks users actually need."},{"@type":"ListItem","position":10,"url":"https://mlq.ai/news/openais-ai-sweeps-all-five-problems-at-atcoder-world-tour-finals-beating-every-human/","name":"OpenAI's model beats every human finalist at AtCoder's World Tour Finals","description":"An OpenAI reasoning model solved all five problems in AtCoder's 2026 Algorithm Division exhibition, scoring 8,300 points against a top human score of 4,300. Reports say no human solved two of the hardest problems, while OpenAI's system also dominated the Heuristic Division earlier in the week."},{"@type":"ListItem","position":11,"url":"https://github.com/Shubhamsaboo/awesome-llm-apps","name":"Shubhamsaboo/awesome-llm-apps","description":"A large, actively updated collection of runnable LLM, AI agent, and RAG applications, with examples spanning starter agents, advanced apps, MCP workflows, and production-style patterns."},{"@type":"ListItem","position":12,"url":"https://github.com/virattt/ai-hedge-fund","name":"virattt/ai-hedge-fund","description":"An open-source project that models a multi-agent investment research team, with agents for analysis, portfolio decisions, and market reasoning. The repo remains active, with recent updates adding model providers and interface improvements."},{"@type":"ListItem","position":13,"url":"https://github.com/Crosstalk-Solutions/project-nomad","name":"Crosstalk-Solutions/project-nomad","description":"Project N.O.M.A.D is a self-contained offline computer stack that bundles local knowledge, utilities, and AI components for use when connectivity is limited. The repository has strong GitHub momentum and a large existing star base."}]}}]}</script>
