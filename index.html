  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/#webpage","name":"The Daily Intelligence — 2026-06-24","url":"https://dailyintelligence.lacbgrey.com.au/","description":"Today’s issue tracks AI moving from demos into daily work: Slack-native agents, safer sandboxes for generated code, AI-assisted open-source security, weekly release automation, hiring interviews, smart glasses, and the agent-building projects developers are actually starring.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-23T20:00:00Z","dateModified":"2026-06-23T20:16:50Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://www.anthropic.com/news/introducing-claude-tag","name":"Anthropic introduces Claude Tag for Slack teams","description":"Anthropic launched Claude Tag, a beta feature for Claude Enterprise and Team customers that lets teams tag @Claude inside Slack channels. Claude can use approved tools and data, retain channel context, break tasks into stages, and work asynchronously in public threads."},{"@type":"ListItem","position":2,"url":"https://aws.amazon.com/blogs/aws/run-isolated-sandboxes-with-full-lifecycle-control-aws-lambda-introduces-microvms/","name":"AWS Lambda MicroVMs target safer execution for AI-generated code","description":"AWS introduced Lambda MicroVMs, a new Lambda resource for running user- or AI-generated code in isolated, stateful Firecracker microVMs. The service is designed for fast launch and resume, per-session state, and stronger isolation than typical container-only approaches."},{"@type":"ListItem","position":3,"url":"https://openai.com/index/omio/","name":"OpenAI shows Omio’s push toward conversational travel booking","description":"OpenAI published a case study on Omio using ChatGPT, Codex, and the API to build conversational travel experiences connected to live transport inventory across 3,000 providers in 47 countries. Omio also reports using Codex across engineering workflows, from planning and coding to review and maintenance."},{"@type":"ListItem","position":4,"url":"https://openai.com/index/patch-the-planet/","name":"OpenAI launches Patch the Planet for open-source security fixes","description":"OpenAI announced Patch the Planet, a Daybreak initiative with Trail of Bits, HackerOne, and Calif to help open-source maintainers validate, patch, test, and disclose security vulnerabilities. Initial participants include cURL, NATS Server, pyca/cryptography, Sigstore, aiohttp, Go, freenginx, Python, and python.org."},{"@type":"ListItem","position":5,"url":"https://huggingface.co/blog/huggingface-hub-release-ci","name":"Hugging Face describes weekly AI-assisted releases for huggingface_hub","description":"Hugging Face explained how it moved huggingface_hub releases from a 4–6 week manual cadence to weekly releases using GitHub Actions, OpenCode, an open-weights model, deterministic validation, and human review. The team’s framing is simple: the model drafts, deterministic code verifies, and a human decides."},{"@type":"ListItem","position":6,"url":"https://about.fb.com/news/2026/06/meta-essilorluxottica-partner-launch-meta-glasses/","name":"Meta launches $299 Meta Glasses with built-in Meta AI","description":"Meta and EssilorLuxottica introduced Meta Glasses, a new line of AI glasses starting at $299 with 26 launch styles, prescription-lens compatibility, camera, open-ear speakers, and Meta AI powered by Muse Spark from day one. Meta says the glasses offer over eight hours of battery life plus up to 40 additional hours from the charging case."},{"@type":"ListItem","position":7,"url":"https://openaca.dev/blog/your-agent-risk-is-in-the-composition/","name":"OpenACA argues agent security needs composition graphs, not just SBOMs","description":"OpenACA argues that agent risk comes from how plugins, skills, MCP servers, hooks, permissions, packages, install paths, and runtime context combine. Its marketplace scan of Claude plugins found composition exposures concentrated in message-channel plugins that ingest untrusted input and can send data back out."},{"@type":"ListItem","position":8,"url":"https://www.computerweekly.com/news/366644941/Artificial-intelligence-based-law-firm-wins-in-court","name":"AI-based UK law firm reports its first court trial win","description":"Computer Weekly reports that Garfield AI, a regulated AI-based UK law firm, supported a freelancer through a Wandsworth County Court case that recovered £7,000 in unpaid fees. Garfield AI helped with correspondence, proceedings, document production, witness statements, trial bundles, and counterclaim response, while both sides used barristers at trial."},{"@type":"ListItem","position":9,"url":"https://arxiv.org/abs/2606.13175","name":"Paper argues coding agents could replace mandatory human code review","description":"A new arXiv paper, The End of Code Review: Coding Agents Supersede Human Inspection, argues that LLM-based coding agents can serve the goals of traditional code review at lower cost and higher throughput. The author contends that requiring humans to review all AI-generated code may become an assurance bottleneck rather than a safeguard."},{"@type":"ListItem","position":10,"url":"https://techcrunch.com/2026/06/23/fika-jobs-raises-4m-to-build-a-video-first-hiring-platform-where-ai-agents-interview-candidates/","name":"Fika Jobs raises $4M for AI-agent video interviews","description":"TechCrunch reports that Stockholm-based Fika Jobs raised a $4 million pre-seed round to build a video-first hiring platform where AI agents interview candidates and turn responses into short profile clips. The system is currently powered by Gemini models and opens early access to candidates this week."},{"@type":"ListItem","position":11,"url":"https://github.com/garrytan/gstack","name":"garrytan/gstack","description":"GStack packages Garry Tan’s opinionated Claude Code setup into a workflow of skills for planning, design review, engineering review, QA, security review, release, documentation, and team memory. The repo frames the process as Think → Plan → Build → Review → Test → Ship → Reflect."},{"@type":"ListItem","position":12,"url":"https://github.com/NousResearch/hermes-agent","name":"NousResearch/hermes-agent","description":"Hermes Agent is an open-source, provider-agnostic AI agent framework with terminal use, messaging gateways, scheduled automations, persistent memory, profiles, skills, and multi-platform deployment. The project emphasizes agents that can learn reusable skills and operate across CLI, chat platforms, and remote infrastructure."},{"@type":"ListItem","position":13,"url":"https://github.com/heygen-com/hyperframes","name":"heygen-com/hyperframes","description":"HyperFrames is an open-source framework for writing video compositions in HTML, CSS, and seekable animations, then rendering deterministic MP4 output with headless Chrome and FFmpeg. It is explicitly designed for agents, with skills that help plan, build, lint, preview, and render videos."}]}}]}</script>
