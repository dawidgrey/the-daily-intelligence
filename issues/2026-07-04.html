  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-04.html#webpage","name":"The Daily Intelligence — 2026-07-04","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-04.html","description":"Today’s issue follows a practical thread: AI agents are becoming more capable when given time and compute, while builders are racing to make those agents safer, cheaper, and more useful inside everyday software.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-07-03T20:00:00Z","dateModified":"2026-07-03T20:09:23Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://www.aisi.gov.uk/blog/more-compute-more-capability-why-ai-agent-evals-need-to-account-for-test-time-compute","name":"AISI says agent evaluations need to measure capability across compute budgets","description":"The UK AI Security Institute argues that AI agent capability is not a single benchmark score but a curve over test-time compute. Its testing found that larger token budgets can expose substantially stronger results, especially in software engineering, cybersecurity, mathematics, and academic tasks."},{"@type":"ListItem","position":2,"url":"https://adapt.com/blog/orchestrating-agent-sandboxes","name":"Adapt explains how it runs isolated computers for AI agents at scale","description":"Adapt described its infrastructure for giving each AI-agent conversation an isolated VM where the model can install tools, write code, browse, and call APIs. The post walks through its move from gVisor on GKE toward Firecracker-style microVM orchestration for faster, safer sandboxing."},{"@type":"ListItem","position":3,"url":"https://www.openui.com","name":"OpenUI proposes an open standard for AI-generated interfaces","description":"OpenUI is positioning itself as an open-source toolkit and standard for generative UI, letting agents respond with structured interfaces rather than only text or bulky JSON. Developers define approved components, then models compose those components using OpenUI Lang for streaming, cross-platform UI."},{"@type":"ListItem","position":4,"url":"https://deepswe.datacurve.ai/","name":"DeepSWE benchmark targets harder long-horizon coding-agent work","description":"DeepSWE introduces a contamination-conscious benchmark for long-horizon software engineering tasks, with 113 tasks across 91 repositories and hand-written behavioral verifiers. The leaderboard reports that top frontier models are separating more clearly on cost, steps, and pass rates than on saturated coding benchmarks."},{"@type":"ListItem","position":5,"url":"https://www.bbc.com/news/articles/cj6gr0xkyr3o","name":"BBC profiles Yann LeCun’s push beyond LLMs toward world models","description":"BBC News profiled Yann LeCun’s argument that current large language models remain limited for real-world intelligence and robotics. His new AMI Labs is pursuing JEPA-style world models that aim to reason about physical reality, causality, and action outcomes more flexibly."},{"@type":"ListItem","position":6,"url":"https://www.collaboraonline.com/blog/collabora-office-26-04-release/","name":"Collabora Office 26.04 adds optional, user-controlled AI to desktop documents","description":"Collabora Office 26.04 brings the suite’s online codebase further onto Windows, macOS, and Linux, with an AI sidebar for Writer, Calc, and Impress. The AI is disabled by default, lets users choose their own provider or self-hosted model, and requires approval before reading from or writing to documents."},{"@type":"ListItem","position":7,"url":"https://epoch.ai/data/cve?view=graph","name":"Epoch AI’s CVE explorer highlights the surge in high-severity vulnerability reports","description":"Epoch AI updated its Cyber Vulnerabilities explorer, which tracks published CVE records from 2020 onward by severity and reporting organization. The dataset makes it easier to inspect the recent rise in high and critical vulnerability reporting, while noting that publication dates and CNA reporting practices affect the numbers."},{"@type":"ListItem","position":8,"url":"https://techcrunch.com/2026/07/02/meta-quietly-launches-vibe-coded-gaming-app-pocket/","name":"Meta quietly launches Pocket for prompt-made mini apps and games","description":"TechCrunch reports that Meta has quietly released Pocket, an experimental app for creating and sharing small interactive games and apps from text prompts. The app appears linked to Meta’s acquisition of the team behind Gizmo and is still early enough that Meta had not formally announced it."},{"@type":"ListItem","position":9,"url":"https://the-decoder.com/chinese-ai-video-maker-kling-raises-2-billion-as-it-gears-up-for-hong-kong-ipo/","name":"Kling raises about $2 billion as AI video competition heats up","description":"The Decoder reports that Kuaishou’s AI video unit Kling has raised about $2 billion at a reported $18 billion valuation, with a possible Hong Kong listing ahead. Kling competes in a fast-moving AI video market that includes Google, Runway, ByteDance, and other model makers."},{"@type":"ListItem","position":10,"url":"https://arxiv.org/abs/2607.01507","name":"The Agentic Garden of Forking Paths tests how AI agents can shape data analysis conclusions","description":"A new arXiv paper argues that AI agents can reveal—and potentially amplify—the many defensible analysis paths in empirical research. The authors show that different agent personas can produce divergent conclusions from the same data, then propose an Agentic Bootstrap method for estimating how extreme a reported analysis is within a wider multiverse of plausible analyses."},{"@type":"ListItem","position":11,"url":"https://github.com/safishamsi/graphify","name":"safishamsi/graphify","description":"Graphify turns codebases, schemas, documents, papers, images, audio, and video into a queryable knowledge graph for AI coding assistants. It supports many agent environments, including Claude Code, Codex, Cursor, Gemini CLI, and Hermes."},{"@type":"ListItem","position":12,"url":"https://github.com/harvard-edge/cs249r_book","name":"harvard-edge/cs249r_book","description":"This repository hosts Harvard’s Machine Learning Systems curriculum, including textbook material, labs, TinyTorch, simulators, hardware kits, and teaching resources. It focuses on engineering reliable AI systems rather than treating models in isolation."},{"@type":"ListItem","position":13,"url":"https://github.com/agentskills/agentskills","name":"agentskills/agentskills","description":"The Agent Skills repository documents an open format for giving AI agents reusable capabilities, workflows, and domain knowledge. A skill packages instructions plus optional scripts, references, templates, and assets in a portable folder structure."}]}}]}</script>
