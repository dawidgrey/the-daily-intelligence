  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-08.html#webpage","name":"The Daily Intelligence — 2026-07-08","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-08.html","description":"Today’s issue tracks AI leaving the demo stage and entering operating systems for work, health, cloud infrastructure, moderation, security, and personal protection. The useful pattern is not bigger claims, but better control: agents that keep working across devices, cheaper model deployment paths, clearer rules for accuracy, and tools that help people handle practical risks.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-07-07T20:00:00Z","dateModified":"2026-07-14T20:04:24Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://claude.com/blog/cowork-web-mobile","name":"Claude Cowork comes to web and mobile with cloud-running tasks","description":"Anthropic says Claude Cowork is rolling out to web and mobile, starting with Max users, so sessions can continue across devices. Cowork tasks can now keep running in the cloud, including scheduled work when no user device is online, while approval points still return to the user."},{"@type":"ListItem","position":2,"url":"https://whbl.com/2026/07/06/exclusive-us-cyber-agency-is-using-anthropics-mythos-to-audit-government-code-sources-say/","name":"CISA is reportedly using Anthropic Mythos to audit U.S. government code","description":"Reuters reports that CISA is using Anthropic’s Mythos model to scan U.S. government code repositories for vulnerabilities. Sources said the work is being handled by CISA’s Attack Surface Evaluation team and has already surfaced many issues, though details remain limited."},{"@type":"ListItem","position":3,"url":"https://www.federalregister.gov/documents/2026/07/07/2026-13628/policy-statement-concerning-the-suppression-of-accuracy-in-artificial-intelligence-systems","name":"The FTC warns against AI systems that suppress accurate information","description":"The Federal Trade Commission published a policy statement on the suppression of accuracy in AI systems, with public comments open until July 31. The notice frames misleading design, omitted information, and claims that undercut accurate user understanding as potential consumer-protection concerns."},{"@type":"ListItem","position":4,"url":"https://huggingface.co/blog/microsoft/foundry-managed-compute","name":"Microsoft puts Hugging Face models on Foundry Managed Compute","description":"Microsoft and Hugging Face detailed a Foundry integration that lets enterprises deploy curated open-weight Hugging Face models onto Foundry Managed Compute. The setup promises pre-staged weights in Azure, scanned runtimes, unified billing, observability, governance, and support for runtimes such as vLLM, SGLang, TensorRT-LLM, NIM, TEI, and llama.cpp."},{"@type":"ListItem","position":5,"url":"https://huggingface.co/blog/skypilot-hf-storage","name":"Hugging Face and SkyPilot add zero-egress storage for portable AI workloads","description":"Hugging Face and SkyPilot now let AI jobs mount Hugging Face Buckets, model repos, and dataset repos through an hf:// path while running compute across clouds, Kubernetes, Slurm, or on-prem systems. Hugging Face says the storage path has no egress fees, so workloads can move to available GPUs without copying data between cloud buckets."},{"@type":"ListItem","position":6,"url":"https://openai.com/index/australian-payments-plus","name":"OpenAI says Australian Payments Plus cut technical investigations from hours to minutes","description":"OpenAI published a case study on Australian Payments Plus using ChatGPT Enterprise and Codex across payments and identity infrastructure work. The company says surveyed users saved time, improved work quality, and used Codex to reduce one complex reconciliation investigation from about four hours to roughly 30 minutes."},{"@type":"ListItem","position":7,"url":"https://www.england.nhs.uk/2026/07/nhs-accelerates-artificial-intelligence-rollout-to-cut-waiting-times-and-improve-care-for-millions/","name":"NHS England accelerates AI triage and ambient notetaking rollout","description":"NHS England says it is accelerating AI tools across the health service, including an AI triage tool in the NHS App and wider ambient voice tools that generate clinical notes. The triage feature is expected to reach more than 200,000 patients within 12 months and all NHS App users by April 2028."},{"@type":"ListItem","position":8,"url":"https://techcrunch.com/2026/07/07/discord-admits-ai-moderation-bug-wrongfully-banned-users-over-harmless-images/","name":"Discord says an AI moderation bug wrongly banned users over harmless images","description":"TechCrunch reports that Discord acknowledged an AI moderation bug that wrongly banned more than 8,000 users after harmless images were flagged as harmful content. The affected images reportedly included spreadsheets, chessboards, game textures, and transparent backgrounds."},{"@type":"ListItem","position":9,"url":"https://techcrunch.com/2026/07/07/savis-app-aims-to-protect-consumers-from-realistic-ai-scams-like-kidnappers-demanding-ransom/","name":"Savi launches a consumer app aimed at realistic AI scams","description":"TechCrunch reports that Savi Security raised $7 million in seed funding and launched an iPhone and Android app designed to help consumers respond to realistic AI scams, including impersonation and ransom-style calls. The product targets a growing consumer-security problem as voice and image generation improve."},{"@type":"ListItem","position":10,"url":"https://techcrunch.com/2026/07/07/microsoft-joins-ai-cost-cutting-trend-by-relying-more-on-its-own-models","name":"Microsoft reportedly leans more on in-house models to cut AI costs","description":"TechCrunch reports that Microsoft is relying more on its own AI models in some products as companies look for ways to control rising AI costs. The article frames the move as part of a broader industry push to optimize model choice instead of defaulting to the most expensive frontier providers."},{"@type":"ListItem","position":11,"url":"https://github.com/TencentCloud/TencentDB-Agent-Memory","name":"TencentCloud/TencentDB-Agent-Memory","description":"TencentDB Agent Memory is a fast-trending TypeScript and Python project for local long-term memory in AI agents. The repository describes a four-tier progressive memory pipeline with no external API dependency, and GitHub currently shows about 7.1k stars and 673 forks."},{"@type":"ListItem","position":12,"url":"https://github.com/kyutai-labs/pocket-tts","name":"kyutai-labs/pocket-tts","description":"Kyutai Labs’ pocket-tts is a Python project for text-to-speech designed to fit on a CPU. The repository describes it as a TTS that fits in your pocket, and GitHub currently shows about 6k stars and 633 forks."},{"@type":"ListItem","position":13,"url":"https://github.com/lessweb/deepcode-cli","name":"lessweb/deepcode-cli","description":"deepcode-cli is a TypeScript terminal coding assistant optimized for DeepSeek V4, with support for deep reasoning, reasoning-intensity controls, and agent skills. GitHub currently shows about 1.7k stars and 150 forks, with active commits on July 7."}]}}]}</script>
