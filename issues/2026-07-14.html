  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-14.html#webpage","name":"The Daily Intelligence — 2026-07-14","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-14.html","description":"Today’s issue looks at AI moving from impressive demos into everyday workflows: agent frameworks for Go, model deployment shortcuts, local spreadsheet tools, finance research, and more deliberate automation. There is also a useful reality check on what world models may—and may not—deliver next.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-07-13T20:00:00Z","dateModified":"2026-07-23T20:05:12Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://devblogs.microsoft.com/go/microsoft-agent-framework-for-go-public-preview/","name":"Microsoft previews its Agent Framework for Go","description":"Microsoft has released a public preview of its Agent Framework SDK for Go. It brings tool use, MCP, multi-agent workflows, checkpoints, approvals, and OpenTelemetry tracing to Go services and workers."},{"@type":"ListItem","position":2,"url":"https://huggingface.co/blog/amazon/one-click-to-sagemaker-studio","name":"Hugging Face adds a one-click path into SageMaker Studio","description":"A new Hugging Face–Amazon deep link sends a selected model directly into the relevant Amazon SageMaker Studio workflow. The environment arrives configured with the model ready for fine-tuning or deployment."},{"@type":"ListItem","position":3,"url":"https://nobie.com","name":"Nobie offers a local, AI-ready spreadsheet app for Mac","description":"Nobie is a Mac beta positioned as an Excel-compatible runtime for people and agents. It keeps XLSX files and data local, preserves Windows Excel shortcuts, and lets users choose direct connections to Claude, Codex, or Gemini."},{"@type":"ListItem","position":4,"url":"https://finterm.ai/","name":"Finterm packages financial research for coding agents","description":"Finterm is a preview product that gives agents structured market data, filing diffs, ticker research, options summaries, and source-labelled outputs through a CLI. It says its research workflow crawls, deduplicates, and tiers sources before returning results."},{"@type":"ListItem","position":5,"url":"https://scottwillsey.com/building-and-shipping-mac-and-ios-apps-without-ever-opening-xcode/","name":"A practical guide to shipping Apple apps without opening Xcode","description":"This hands-on guide shows how to script the Mac and iOS release pipeline around Xcode command-line tools: project generation, building, signing, notarisation, stapling, and deployment. Xcode still has to be installed and initial credentials must be configured once."},{"@type":"ListItem","position":6,"url":"https://sourcediver.org/posts/260713_attention_is_all_they_want/","name":"A local LLM prototype filters web pages by meaning","description":"A developer describes a Firefox extension prototype that uses compact local language models to hide page content matching natural-language rules. Tests on an AMD GPU were fast enough for near-real-time browsing, while CPU-only use was slower and smaller models caused too many false positives."},{"@type":"ListItem","position":7,"url":"https://ykumar.me/blog/j-space-oddity/","name":"A Jacobian lens probes how a vision-language model represents images","description":"An independent reproduction extends Anthropic’s Jacobian-lens interpretability approach to Qwen2.5-VL-7B. The experiment probes whether a lens fitted only on text can expose word-like representations for image patches; the author reports promising but correlational results and clear limitations."},{"@type":"ListItem","position":8,"url":"https://arstechnica.com/ai/2026/07/simulating-everything-sort-of-the-promise-and-limits-of-world-models/","name":"World models promise physical intuition, but the path is unsettled","description":"Ars Technica surveys the growing world-model category through conversations with researchers and builders. These systems aim to simulate useful aspects of the physical world for areas such as robotics, research, and asset creation, but their interfaces, representations, and proof of value remain open questions."},{"@type":"ListItem","position":9,"url":"https://www.cnbc.com/2026/07/07/chinese-ai-models-costs-us-openai-anthropic.html","name":"Cheaper Chinese models are gaining U.S. enterprise usage","description":"CNBC reports that U.S. companies are increasingly trying Chinese-built models as costs for leading proprietary systems rise. It cites OpenRouter data showing the share of tokens used by U.S. companies on Chinese models has exceeded 30% weekly since February and reached 46% at one point."},{"@type":"ListItem","position":10,"url":"https://techcrunch.com/2026/07/13/waze-adds-new-ai-powered-features-and-customization-updates/","name":"Waze adds Gemini-powered features and new customisation","description":"Waze has announced new AI-powered features and customisation updates, with some capabilities using Google’s Gemini assistant. The change is part of Google’s broader effort to place Gemini across its consumer products while Waze competes with other navigation services."},{"@type":"ListItem","position":11,"url":"https://github.com/OpenCut-app/OpenCut","name":"OpenCut: a fast-growing open-source video editor with an agent-ready roadmap","description":"OpenCut is an open-source video editor for web, desktop, and mobile. Its active rewrite plans a Rust core, plugin-first architecture, headless batch rendering, scripting, and an MCP server for AI agents; the project has roughly 65,800 GitHub stars."},{"@type":"ListItem","position":12,"url":"https://github.com/github/spec-kit","name":"Spec Kit: GitHub’s popular toolkit for spec-driven AI-assisted development","description":"Spec Kit is GitHub’s toolkit for starting spec-driven development projects and currently has about 121,000 stars. It supports multiple coding-agent integrations and received a new release on July 13."},{"@type":"ListItem","position":13,"url":"https://github.com/YishenTu/claudian","name":"Claudian: bring Claude Code or Codex into an Obsidian vault","description":"Claudian is an Obsidian plugin that embeds Claude Code and Codex as collaborators in a knowledge vault. The TypeScript project has about 14,000 stars and shipped version 2.0.34 on July 13."}]}}]}</script>
