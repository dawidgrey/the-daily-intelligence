ers plan their work","description":"Max Woolf documents frequent, unannounced weekly quota resets for subscription coding agents, including six Codex resets in two weeks. He argues that nominal weekly allowances have become difficult to value or plan around when providers repeatedly reset them during intense model competition."},{"@type":"ListItem","position":3,"url":"https://www.xshellz.com/","name":"xShellz offers persistent sandboxed Linux boxes for coding agents","description":"xShellz has introduced Agent Shell, a persistent Ubuntu environment that coding agents can reach over SSH or a browser and control as root. The service uses gVisor isolation, resource caps and live monitoring, with Claude Code, Codex, Gemini and its own agent preinstalled."},{"@type":"ListItem","position":4,"url":"https://www.medows.ai/demo","name":"Medows demonstrates an AI-assisted clinical workspace for ward rounds","description":"Medows has published an interactive demonstration of a clinical workspace that organises ward patients, vital signs, status changes and handover tasks in one interface. The demo positions AI as support for reviewing and coordinating a shift rather than as an autonomous diagnosis system."},{"@type":"ListItem","position":5,"url":"https://www.cnbc.com/2026/07/17/anthropic-meta-ai-compute.html","name":"Anthropic is reportedly exploring a $10 billion Meta compute lease","description":"CNBC reports that Anthropic is in preliminary talks to lease AI computing capacity from Meta, with a potential agreement discussed at roughly $10 billion. The talks follow Anthropic’s separate SpaceX capacity arrangement and Meta’s interest in selling excess data-centre compute."},{"@type":"ListItem","position":6,"url":"https://techcrunch.com/2026/07/17/ai-driven-memory-crunch-jolts-indias-smartphone-market/","name":"AI demand for memory chips is pushing up budget smartphone costs","description":"TechCrunch reports that memory manufacturers are prioritising profitable high-bandwidth memory for AI accelerators, tightening supplies of RAM and storage for consumer devices. In India, smartphone shipments fell 10% year over year in the June quarter as higher component costs hit the budget market hardest."},{"@type":"ListItem","position":7,"url":"https://techcrunch.com/2026/07/17/agility-robotics-plants-its-flag-in-teslas-backyard/","name":"Agility Robotics opens a training centre for commercially deployed humanoids","description":"Agility Robotics is opening a 60,000-square-foot Fremont facility where its Digit humanoids will learn tasks in environments resembling customer sites. The company says Digit is already doing paid warehouse and manufacturing work and that more than 30 prospective customers are discussing deployments."},{"@type":"ListItem","position":8,"url":"https://www.espn.com/mlb/story/_/id/49385415/mlb-restricts-dugout-ipad-use-prevent-artificial-intelligence-game-decision-making","name":"MLB blocks dugout apps that recommend AI-assisted game decisions","description":"Major League Baseball has disabled custom dugout iPad tabs that teams used for recommendations on substitutions, pitch calling and other in-game choices. League-provided video and data remain available, but real-time strategic recommendations now sit outside the tablets’ permitted purpose."},{"@type":"ListItem","position":9,"url":"https://www.cnbc.com/2026/07/17/white-house-ai-access-anthropic-openai.html","name":"US government influence over frontier-model access is reportedly expanding","description":"CNBC reports that the White House is taking a larger role in deciding which partners receive access to powerful unreleased AI models, particularly for cybersecurity work. A White House official says participation in government testing is voluntary and release decisions remain with the companies."},{"@type":"ListItem","position":10,"url":"https://magazine.sebastianraschka.com/p/controlling-reasoning-effort-in-llms","name":"A practical guide explains how models learn low-, medium- and high-effort reasoning","description":"Sebastian Raschka explains how reasoning models can be trained to produce different effort levels, from short low-cost traces to longer high-effort work. The article connects supervised fine-tuning, reinforcement learning with verifiable rewards and token-budget controls to the reasoning settings now common in model APIs."},{"@type":"ListItem","position":11,"url":"https://github.com/tirth8205/code-review-graph","name":"tirth8205/code-review-graph","description":"code-review-graph is a local-first code intelligence graph for CLI and MCP workflows, designed to help coding agents retrieve the parts of a repository that matter for a change. The project has about 20,000 stars and led today’s collected AI-related GitHub Trending results by momentum."},{"@type":"ListItem","position":12,"url":"https://github.com/SigNoz/signoz","name":"SigNoz/signoz","description":"SigNoz is an open-source, OpenTelemetry-native observability platform that brings application traces, metrics and logs together and now explicitly supports monitoring AI-agent workloads. The mature project has about 30,700 stars and was one of the strongest AI-related repositories in today’s Trending collection."},{"@type":"ListItem","position":13,"url":"https://github.com/KnockOutEZ/wigolo","name":"KnockOutEZ/wigolo","description":"wigolo is a fast-rising local-first web search, fetch, crawl and research service for AI coding agents, exposed through MCP and SDK integrations. The public-beta project has passed 1,100 stars and ranked third by momentum among today’s collected AI-related GitHub Trending candidates."}]}}]}</script>
