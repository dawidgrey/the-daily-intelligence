  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-16.html#webpage","name":"The Daily Intelligence — 2026-06-16","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-16.html","description":"Today's issue tracks a practical shift in AI: agents are getting safer identities, more persistent workspaces, better voice interfaces, and clearer enterprise adoption paths. The signal is less about spectacle and more about where AI starts changing ordinary workflows, buying decisions, customer support, learning, and local development.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-15T20:00:00Z","dateModified":"2026-06-24T20:08:00Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://techcrunch.com/2026/06/15/salesforce-acquires-ai-customer-service-platform-fin-for-3-6b/","name":"Salesforce to acquire Fin for $3.6B to strengthen Agentforce","description":"Salesforce signed an agreement to buy Fin, the AI customer-service platform formerly known as Intercom, for about $3.6 billion. Salesforce says Fin's team and technology will deepen Agentforce's service-agent capabilities across chat, WhatsApp, SMS, phone, Slack, and other support channels."},{"@type":"ListItem","position":2,"url":"https://techcrunch.com/2026/06/15/ai-agents-are-becoming-employees-newcore-emerges-with-66m-to-give-them-identities/","name":"NewCore raises $66M to manage identities for AI agents","description":"Cybersecurity startup NewCore emerged from stealth with $66 million in seed funding to manage identities, permissions, and lifecycle controls for human workers, machines, and AI agents. Its product includes integrations for Claude Code, Codex, and Cursor so coding agents can access enterprise systems through managed identities rather than shared credentials."},{"@type":"ListItem","position":3,"url":"https://deepmind.google/blog/fluid-natural-voice-translation-with-gemini-35-live-translate/","name":"Google launches Gemini 3.5 Live Translate for near real-time speech translation","description":"Google DeepMind introduced Gemini 3.5 Live Translate, an audio model that provides near real-time speech-to-speech translation across more than 70 languages while preserving intonation, pacing, and pitch. It is available to developers through the Gemini Live API and Google AI Studio, with previews in Google Meet and the Google Translate app."},{"@type":"ListItem","position":4,"url":"https://deepmind.google/blog/introducing-gemma-4-12b-a-unified-encoder-free-multimodal-model/","name":"Google introduces Gemma 4 12B for local multimodal agents","description":"Google DeepMind released Gemma 4 12B, a mid-sized multimodal model designed to run on laptops with around 16GB of memory. The model uses a unified, encoder-free architecture for vision and native audio inputs and is released under Apache 2.0."},{"@type":"ListItem","position":5,"url":"https://openai.com/index/introducing-openai-partner-network","name":"OpenAI launches Partner Network with $150M enterprise adoption push","description":"OpenAI announced a global Partner Network backed by a $150 million investment to help partners build, sell, and deliver AI solutions. The company says it aims to enable 300,000 certified consultants by the end of 2026 and highlighted enterprise deployments with Agilent, eBay, Paychex, and T-Mobile."},{"@type":"ListItem","position":6,"url":"https://openai.com/index/academy-courses-applying-ai-at-work","name":"OpenAI Academy adds courses for agents and repeatable workflows","description":"OpenAI introduced three Academy courses: AI Foundations, Applied AI Foundations, and Agents and Workflows. The curriculum is designed to help employees move from one-off prompts to repeatable AI-enabled workflows with checkpoints, model choices, tools, and human oversight."},{"@type":"ListItem","position":7,"url":"https://openai.com/index/openai-to-acquire-ona","name":"OpenAI plans to acquire Ona to give Codex persistent cloud workspaces","description":"OpenAI said it will acquire Ona, a company focused on secure cloud execution and orchestration, to expand Codex with persistent, customer-controlled environments. OpenAI says more than 5 million people use Codex weekly and that usage is up 400% from earlier in 2026."},{"@type":"ListItem","position":8,"url":"https://cloud.google.com/blog/products/data-analytics/how-the-open-knowledge-format-can-improve-data-sharing","name":"Google Cloud proposes Open Knowledge Format for agent-readable context","description":"Google Cloud introduced Open Knowledge Format, a vendor-neutral specification that represents organizational knowledge as Markdown files with YAML frontmatter. The format is intended to make metadata, business definitions, runbooks, and other context portable across agents and systems."},{"@type":"ListItem","position":9,"url":"https://www.reuters.com/business/media-telecom/ai-referred-us-shoppers-browse-longer-spend-more-per-visit-data-shows-2026-06-15/","name":"Reuters: AI-referred shoppers browse longer and spend more per visit","description":"Reuters reported Adobe Analytics data showing U.S. retail traffic referred by LLMs such as ChatGPT and Gemini rose 138% year over year in May. Adobe said AI-referred shoppers generated 53% more revenue per visit, converted 54% more often, and spent 53% more time on retail sites than non-AI referrals."},{"@type":"ListItem","position":10,"url":"https://www.cartesia.ai/launch/","name":"Cartesia launches Sonic-3.5 and Ink-2 for real-time voice AI","description":"Cartesia launched Sonic-3.5 for text-to-speech and Ink-2 for speech-to-text, positioning them as a combined low-latency stack for voice agents. The company claims sub-90ms TTS latency, 100ms transcript latency, native turn detection, and support for more than 40 languages in Sonic-3.5."},{"@type":"ListItem","position":11,"url":"https://github.com/NVIDIA/SkillSpector","name":"NVIDIA/SkillSpector","description":"SkillSpector is a security scanner for AI-agent skills that detects malicious patterns, vulnerabilities, data exfiltration risks, prompt injection issues, privilege escalation paths, and MCP-related risks. It supports repositories, URLs, ZIP files, directories, single files, and output formats such as JSON, Markdown, and SARIF."},{"@type":"ListItem","position":12,"url":"https://github.com/Panniantong/Agent-Reach","name":"Panniantong/Agent-Reach","description":"Agent Reach is a capability layer that helps AI agents read and search web platforms including YouTube, GitHub, RSS feeds, X/Twitter, Reddit, Bilibili, and XiaoHongShu through selected open-source tools. It installs, configures, health-checks, and routes backends so agents can access external content more reliably."},{"@type":"ListItem","position":13,"url":"https://github.com/rohitg00/ai-engineering-from-scratch","name":"rohitg00/ai-engineering-from-scratch","description":"AI Engineering from Scratch is an open-source curriculum with 503 lessons across 20 phases, covering math, machine learning, transformers, LLMs, multimodal systems, tools, MCP, agent engineering, infrastructure, safety, and capstone projects. Every lesson is designed to produce a reusable artifact such as a prompt, skill, agent, or MCP server."}]}}]}</script>
