  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-21.html#webpage","name":"The Daily Intelligence — 2026-06-21","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-21.html","description":"Today’s issue tracks a practical turn in AI: coding agents are getting scheduled, repeatable, and cheaper to run, while open models and agent-native tooling keep narrowing the gap with closed platforms. The through-line is simple: the useful AI story is shifting from chat to dependable workflows.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-20T20:00:00Z","dateModified":"2026-06-30T20:14:20Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://cursor.com/changelog/06-18-26","name":"Cursor adds /automate for plain-English coding automations","description":"Cursor released improvements to Automations, including a /automate skill that lets users describe a task in natural language while Cursor configures the triggers, instructions, and tools. The update also adds Slack emoji triggers, more GitHub triggers, and computer-use support for cloud agents."},{"@type":"ListItem","position":2,"url":"https://developers.openai.com/codex/changelog#codex-2026-06-18-app","name":"OpenAI Codex adds Record & Replay and stronger automation controls","description":"OpenAI’s June 18 Codex app update adds Record & Replay on macOS, turning a demonstrated workflow into a reusable skill. The same release adds bulk actions for automation history and handoff between local and remote hosts."},{"@type":"ListItem","position":3,"url":"https://help.openai.com/en/articles/10291617-scheduled-tasks-in-chatgpt","name":"ChatGPT scheduled tasks get a dedicated management flow","description":"OpenAI’s Scheduled Tasks documentation describes a dedicated Scheduled page for creating, editing, pausing, and deleting one-off or recurring ChatGPT tasks. Monitoring tasks can check for changes and notify users only when there is a meaningful update."},{"@type":"ListItem","position":4,"url":"https://huggingface.co/blog/zai-org/glm-52-blog","name":"GLM-5.2 targets long-horizon coding with 1M-token context","description":"Z.AI introduced GLM-5.2, an MIT-licensed open model focused on long-horizon coding, agentic tasks, and reliable 1M-token context. The release highlights architecture changes such as IndexShare to reduce long-context compute and improve sustained coding-agent performance."},{"@type":"ListItem","position":5,"url":"https://www.southbridge.ai/blog/offmute-v2-glm-vs-opus","name":"Southbridge argues the open-model frontier has arrived","description":"Southbridge published a hands-on comparison in which GLM-5.2 produced a stronger single-shot implementation than Claude Opus 4.8 on the team’s transcription and diarization project. The experiment also produced offmute-v2, a public tool for timestamp-correct, speaker-aware transcripts."},{"@type":"ListItem","position":6,"url":"https://www.technologyreview.com/2026/06/19/1139313/a-startup-claims-it-broke-through-a-bottleneck-thats-holding-back-llms/","name":"Subquadratic claims a sparse-attention breakthrough for cheaper LLMs","description":"MIT Technology Review examined Subquadratic’s claim that its SubQ model uses dynamic sparse attention to avoid the compute bottleneck of dense transformer attention. The company says the approach could make models faster, cheaper, more energy-efficient, and better at long context, though broad access and full independent validation remain limited."},{"@type":"ListItem","position":7,"url":"https://magnitude.dev","name":"Magnitude pitches coding agents on open models at lower cost","description":"Magnitude launched as a coding agent that runs on open models, using smart model routing to split work between a leader model and lower-cost specialist models. The company claims pass-through API pricing, free starter credits, and large cost savings versus closed-model coding agents."},{"@type":"ListItem","position":8,"url":"https://www.argusred.com/cli","name":"ArgusRed releases an AI security-scan and pen-test CLI","description":"ArgusRed’s CLI offers read-only security scans and gated active pen-testing modes for authorized systems. The tool lets users choose security modules, configure agent permissions, and generate markdown reports with severity, cause, evidence, and fix direction."},{"@type":"ListItem","position":9,"url":"https://www.persona-chat.dev/","name":"Persona.js brings WebMCP-native agent UI to vanilla JavaScript","description":"Persona is a lightweight VanillaJS library for building agentic web interfaces that can expose page actions as WebMCP tools. It supports tool approvals, carts, bookings, forms, voice, artifacts, theming, and streaming over any SSE backend."},{"@type":"ListItem","position":10,"url":"https://www.reuters.com/technology/us-scientist-john-jumper-leave-google-deepmind-anthropic-2026-06-19/","name":"AlphaFold co-creator John Jumper is leaving DeepMind for Anthropic","description":"Reuters reports that John Jumper, a Google DeepMind scientist known for co-creating AlphaFold and sharing the 2024 Nobel Prize in Chemistry, is leaving DeepMind to join Anthropic. The move follows other high-profile AI researcher departures amid intense competition for frontier talent."},{"@type":"ListItem","position":11,"url":"https://github.com/microsoft/presidio","name":"microsoft/presidio","description":"Presidio is Microsoft’s open-source framework for detecting, redacting, masking, and anonymizing sensitive data across text, images, DICOM medical images, and structured data."},{"@type":"ListItem","position":12,"url":"https://github.com/code-yeongyu/oh-my-openagent","name":"code-yeongyu/oh-my-openagent","description":"Oh My OpenAgent is a TypeScript coding-agent harness for complex codebases, with editions for OpenCode and Codex and a broader refactor toward multi-harness agent workflows."},{"@type":"ListItem","position":13,"url":"https://github.com/ruvnet/ruflo","name":"ruvnet/ruflo","description":"Ruflo is a multi-agent meta-harness for Claude Code and Codex, adding swarms, memory, MCP tooling, plugins, and coordinated workflows around coding agents."}]}}]}</script>
