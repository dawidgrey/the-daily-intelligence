  <script defer data-domain="dailyintelligence.lacbgrey.com.au" src="https://plausible.io/js/script.js"></script>
  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-14.html#webpage","name":"The Daily Intelligence — 2026-06-14","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-14.html","description":"Today’s issue tracks the practical side of AI adoption: model access, persistent coding agents, workplace training, live translation, open models, agent security, and infrastructure that makes AI systems more useful in real work. The common thread is less glamour and more operating discipline: if AI is going to shape daily life for the better, it needs usable workflows, safer defaults, and tools people can actually trust.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-13T20:00:00Z","dateModified":"2026-07-20T20:06:20Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://www.anthropic.com/news/fable-mythos-access","name":"Anthropic disables Fable 5 and Mythos 5 after U.S. export-control directive","description":"Anthropic said the U.S. government issued an export-control directive requiring suspension of access to Fable 5 and Mythos 5 for foreign nationals. Because the company says it cannot practically enforce that limit user by user, it is disabling the two models for all customers while leaving other Anthropic models unaffected."},{"@type":"ListItem","position":2,"url":"https://openai.com/index/openai-to-acquire-ona/","name":"OpenAI will acquire Ona to give Codex persistent, secure cloud workspaces","description":"OpenAI announced plans to acquire Ona, a company focused on secure cloud execution and orchestration technology. OpenAI says the deal will help Codex support long-running agent workflows inside customer-controlled cloud environments, with better governance, logging, and review."},{"@type":"ListItem","position":3,"url":"https://openai.com/index/academy-courses-applying-ai-at-work/","name":"OpenAI Academy adds courses for AI foundations, workflows, and agents at work","description":"OpenAI introduced three Academy courses: AI Foundations, Applied AI Foundations, and Agents and Workflows. The curriculum is designed to move employees from basic prompting to repeatable workflow design, agent direction, checkpoints, boundaries, and human review."},{"@type":"ListItem","position":4,"url":"https://deepmind.google/blog/fluid-natural-voice-translation-with-gemini-35-live-translate/","name":"Gemini 3.5 Live Translate brings near real-time speech translation to 70+ languages","description":"Google released Gemini 3.5 Live Translate, an audio model for near real-time speech-to-speech translation across more than 70 languages. It is available in public preview for developers through the Gemini Live API and AI Studio, with rollouts planned for Google Translate and private preview in Google Meet."},{"@type":"ListItem","position":5,"url":"https://deepmind.google/blog/introducing-gemma-4-12b-a-unified-encoder-free-multimodal-model/","name":"Google introduces Gemma 4 12B for local multimodal AI on laptops","description":"Google DeepMind introduced Gemma 4 12B, an Apache 2.0 multimodal model designed to run locally with around 16GB of VRAM or unified memory. The model uses a unified, encoder-free architecture for text, vision, and native audio inputs, targeting local agentic workflows and offline use cases."},{"@type":"ListItem","position":6,"url":"https://deepmind.google/blog/investing-in-multi-agent-ai-safety-research/","name":"Google DeepMind and partners open a $10M call for multi-agent AI safety research","description":"Google DeepMind, Schmidt Sciences, the Cooperative AI Foundation, ARIA, and Google.org announced a funding call of up to $10 million for research into multi-agent AI safety. The program targets sandboxes, testbeds, agent-network science, monitoring, and mitigations for systems where many autonomous agents interact."},{"@type":"ListItem","position":7,"url":"https://huggingface.co/blog/hf-cli-for-agents","name":"Hugging Face redesigns its CLI for coding agents as well as humans","description":"Hugging Face detailed how its official `hf` CLI now detects agent usage and can switch to compact, parseable, non-interactive output. The team says agent-friendly CLI output can reduce token use compared with agents hand-rolling API calls, with complex tasks using up to six times fewer tokens in its benchmark."},{"@type":"ListItem","position":8,"url":"https://huggingface.co/blog/CohereLabs/introducing-north-mini-code","name":"Cohere releases North Mini Code, an open model for agentic coding","description":"Cohere released North Mini Code, a 30B-parameter sparse Mixture-of-Experts model with 3B active parameters, available under Apache 2.0. The model is built for agentic coding, terminal tasks, complex code generation, and long-context software workflows across multiple agent scaffolds."},{"@type":"ListItem","position":9,"url":"https://www.kaggle.com/competitions/ai-agent-security-multi-step-tool-attacks","name":"Kaggle launches a multi-step tool-attack competition for AI agent security","description":"Kaggle’s AI Agent Security: Multi-Step Tool Attacks competition asks participants to build attack algorithms that find reproducible failures in tool-using agents. The benchmark focuses on multi-step paths from untrusted inputs to unsafe actions, including exfiltration, destructive writes, and confused-deputy behavior."},{"@type":"ListItem","position":10,"url":"https://www.anthropic.com/news/claude-corps","name":"Anthropic launches Claude Corps with a $150M commitment for AI fellowships","description":"Anthropic launched Claude Corps, a fellowship program that will train 1,000 early-career fellows and place them full-time at nonprofits across the United States. The program begins with a $150 million Anthropic commitment and aims to help nonprofits adopt useful Claude workflows while giving fellows practical AI experience."},{"@type":"ListItem","position":11,"url":"https://github.com/NVIDIA/SkillSpector","name":"NVIDIA/SkillSpector","description":"SkillSpector is NVIDIA’s security scanner for AI-agent skills, checking repositories, URLs, ZIPs, directories, and SKILL.md files for vulnerabilities, malicious patterns, and supply-chain risks. It covers categories including prompt injection, data exfiltration, privilege escalation, dangerous code, and MCP tool poisoning."},{"@type":"ListItem","position":12,"url":"https://github.com/anomalyco/opencode","name":"anomalyco/opencode","description":"OpenCode is a popular open-source AI coding agent with terminal and desktop workflows, built-in planning and build modes, broad package-manager support, and active releases. It appeared as one of the most prominent AI-related repositories in the day’s GitHub collection."},{"@type":"ListItem","position":13,"url":"https://github.com/LMCache/LMCache","name":"LMCache/LMCache","description":"LMCache is an open-source KV cache management layer for scalable LLM inference, designed to make cache state persistent, reusable, observable, and transferable across serving engines and storage systems. It targets long-context, multi-turn, agentic, and RAG workloads where repeated prefill work can be expensive."}]}}]}</script>
