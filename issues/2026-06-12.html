  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-12.html#webpage","name":"The Daily Intelligence — 2026-06-12","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-12.html","description":"Today’s issue tracks AI moving into the operating layer of work: persistent coding agents, faster open models, live translation, safer autonomy controls, and practical consumer tools. The through-line is less about spectacle and more about where AI starts reducing friction in everyday decisions, workflows, and creative systems.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-11T20:00:00Z","dateModified":"2026-07-16T20:06:35Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://openai.com/index/openai-to-acquire-ona","name":"OpenAI plans to acquire Ona to give Codex persistent cloud workspaces","description":"OpenAI announced plans to acquire Ona, a secure cloud execution and orchestration company, to expand Codex with persistent environments for long-running AI agents. OpenAI says Codex is now used by more than 5 million people weekly and is increasingly expected to handle work that spans hours or days."},{"@type":"ListItem","position":2,"url":"https://deepmind.google/blog/diffusiongemma-4x-faster-text-generation/","name":"Google introduces DiffusionGemma, an experimental open model for faster text generation","description":"Google DeepMind released DiffusionGemma, a 26B-parameter MoE open model that generates blocks of text in parallel rather than token by token. Google says it can deliver up to 4x faster generation on dedicated GPUs, while noting quality trade-offs versus standard Gemma models."},{"@type":"ListItem","position":3,"url":"https://deepmind.google/blog/fluid-natural-voice-translation-with-gemini-35-live-translate/","name":"Gemini 3.5 Live Translate brings near real-time voice translation to Google products","description":"Google announced Gemini 3.5 Live Translate, a speech-to-speech model that automatically detects more than 70 languages and produces natural translated audio while staying only a few seconds behind the speaker. It is rolling out through Google AI Studio, the Gemini Live API, Google Translate, and private preview in Google Meet."},{"@type":"ListItem","position":4,"url":"https://www.anthropic.com/news/claude-corps","name":"Anthropic launches Claude Corps with a $150 million nonprofit fellowship commitment","description":"Anthropic announced Claude Corps, a one-year fellowship program that will train 1,000 early-career workers to use Claude and place them with at least 400 U.S. nonprofits. Fellows will receive salaries, training, Claude access, and support from Anthropic, CodePath, and Social Finance."},{"@type":"ListItem","position":5,"url":"https://cursor.com/blog/agent-autonomy-auto-review","name":"Cursor details Auto-review for governing coding-agent autonomy","description":"Cursor described Auto-review, a default feature for new users that uses a classifier agent to review proposed actions before execution. The system treats autonomy as a dial: low-risk actions proceed with fewer interruptions, while high-consequence actions can be blocked or routed to safer alternatives."},{"@type":"ListItem","position":6,"url":"https://techcrunch.com/2026/06/11/doordashs-new-ai-chatbot-lets-you-order-with-prompts-and-photos/","name":"DoorDash launches Ask DoorDash for prompt- and photo-based ordering","description":"DoorDash is rolling out Ask DoorDash, an AI chatbot that lets users search for food, build grocery carts from recipes or photos, reorder items, and find reservations using natural-language requests. The feature is launching on iOS in select regions before broader U.S. expansion."},{"@type":"ListItem","position":7,"url":"https://techcrunch.com/2026/06/11/deezers-new-tool-can-identify-ai-music-from-spotify-apple-music-and-others/","name":"Deezer releases a free tool to detect AI-generated music in playlists","description":"Deezer launched a free online detector that scans playlists from Spotify, Apple Music, SoundCloud, YouTube Music, and other platforms for AI-generated tracks. The company says AI music is now a large share of daily uploads to Deezer, though a much smaller share of actual listening."},{"@type":"ListItem","position":8,"url":"https://www.technologyreview.com/2026/06/11/1138794/google-deepmind-is-worried-about-what-happens-when-millions-of-agents-start-to-interact/","name":"Google DeepMind funds research into risks from large-scale agent interaction","description":"MIT Technology Review reports that Google DeepMind and partners are backing a $10 million research effort into multi-agent AI safety. The focus is on what happens when many autonomous agents interact online, including risks around scams, prompt injection, cyberattacks, and unpredictable collective behavior."},{"@type":"ListItem","position":9,"url":"https://huggingface.co/blog/openenv-agentic-rl","name":"Hugging Face opens OpenEnv governance for agentic reinforcement learning","description":"Hugging Face says OpenEnv, a protocol layer for agentic execution environments, is moving toward broader community governance with backing from organizations including Meta-PyTorch, Nvidia, Modal, Prime Intellect, and others. The project aims to standardize how environments are published, deployed, and consumed by agents for training and evaluation."},{"@type":"ListItem","position":10,"url":"https://huggingface.co/blog/CohereLabs/introducing-north-mini-code","name":"Cohere releases North Mini Code, its first developer-focused model","description":"Cohere released North Mini Code, a 30B-parameter sparse MoE model with 3B active parameters, under Apache 2.0. The model is designed for agentic software engineering, terminal workflows, and multiple coding-agent harnesses including OpenCode and SWE-Agent."},{"@type":"ListItem","position":11,"url":"https://github.com/anomalyco/opencode","name":"anomalyco/opencode","description":"OpenCode is an open-source AI coding agent with terminal and desktop workflows, built-in planning and build agents, and broad package-manager support. It appeared among the top AI-related GitHub candidates collected for the issue."},{"@type":"ListItem","position":12,"url":"https://github.com/activeloopai/hivemind","name":"activeloopai/hivemind","description":"Hivemind is a shared memory and skill system for coding agents that captures sessions, mines reusable patterns, and propagates them across tools such as Claude Code, Codex, Cursor, OpenClaw, and Hermes Agent. It was one of the day’s higher-scoring AI-related GitHub candidates."},{"@type":"ListItem","position":13,"url":"https://github.com/NVIDIA/SkillSpector","name":"NVIDIA/SkillSpector","description":"SkillSpector is an NVIDIA security scanner for AI-agent skills that checks repositories, URLs, ZIPs, directories, or SKILL.md files for vulnerabilities, malicious patterns, and supply-chain risks. It scans across categories including prompt injection, data exfiltration, privilege escalation, and MCP tool poisoning."}]}}]}</script>
