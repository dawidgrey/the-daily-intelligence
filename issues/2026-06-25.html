  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-25.html#webpage","name":"The Daily Intelligence — 2026-06-25","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-25.html","description":"Today’s issue tracks AI becoming more operational: Gemini gets built-in computer use, Qwen releases an agent world model, Figma turns code and motion into design materials, OpenAI moves deeper into chips and ads, and new tools show agents coordinating, creating, and shipping in more practical settings.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-24T20:00:00Z","dateModified":"2026-07-05T20:08:11Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://deepmind.google/blog/introducing-computer-use-in-gemini-3-5-flash/","name":"Google adds computer use to Gemini 3.5 Flash","description":"Google made computer use a built-in tool in Gemini 3.5 Flash, letting developers build agents that can see, reason, and act across browser, mobile, and desktop environments. Google highlights enterprise uses such as continuous software testing, knowledge-work automation, and accessibility audits, with safeguards for prompt-injection and sensitive actions."},{"@type":"ListItem","position":2,"url":"https://openai.com/index/openai-broadcom-jalapeno-inference-chip/","name":"OpenAI and Broadcom unveil Jalapeño, a custom inference chip","description":"OpenAI and Broadcom announced Jalapeño, OpenAI’s first custom Intelligence Processor for large-language-model inference. The companies say the chip is designed for OpenAI workloads such as ChatGPT, Codex, the API, and future agentic products, with initial deployment targeted by the end of 2026."},{"@type":"ListItem","position":3,"url":"https://qwen.ai/blog?id=qwen-agentworld","name":"Qwen releases AgentWorld for language-based agent simulation","description":"Alibaba’s Qwen team released Qwen-AgentWorld, a language world model trained to simulate agent environments across terminal, software engineering, web, OS, Android, search, and MCP domains. The release includes AgentWorldBench and open model weights for a 35B-A3B variant, with a larger 397B-A17B model evaluated in the paper."},{"@type":"ListItem","position":4,"url":"https://www.figma.com/blog/config-2026-recap/","name":"Figma turns code, motion, shaders, and AI tools into canvas materials","description":"At Config 2026, Figma announced code layers, Figma Motion, shader fills and effects, generative plugins, and expanded AI agent tooling. Code layers will let teams place interactive code directly on the collaborative canvas, while motion timelines and MCP-compatible handoff bring animation closer to design systems and coding agents."},{"@type":"ListItem","position":5,"url":"https://creators.facebook.com/blog/introducing-new-facebook-creator-studio","name":"Facebook brings back Creator Studio as an AI-powered companion app","description":"Meta is relaunching Facebook Creator Studio as a dedicated AI-powered app for creators, with personalized recommendations, daily priorities, performance insights, and an AI comment tool that drafts replies in the creator’s voice for approval. Meta says the app is designed to help creators focus on growth and community management outside the main Facebook feed."},{"@type":"ListItem","position":6,"url":"https://openart.ai/blog/openart-director-press-release/","name":"OpenArt Director turns conversations into longer AI videos","description":"OpenArt launched Director, a conversational video-creation tool that can develop, produce, and refine videos up to five minutes long with consistent characters, scenes, lighting, voices, music, and sound. The company describes the workflow as “vibe directing,” where users shape the story and style through conversation rather than manual editing."},{"@type":"ListItem","position":7,"url":"https://ads.openai.com/","name":"OpenAI opens ChatGPT advertising to marketers","description":"OpenAI’s Ads site now invites advertisers to create campaigns for ChatGPT, positioning the channel around high-intent moments when people compare options and make decisions. The page says ads are clearly labeled, separate from ChatGPT’s responses, and managed through an Ads Manager with campaign setup, measurement, and optimization tools."},{"@type":"ListItem","position":8,"url":"https://www.theguardian.com/technology/2026/jun/24/meta-pauses-employee-tracker-for-ai-training-amid-privacy-concerns","name":"Meta pauses employee computer-use tracking for AI training","description":"Meta paused an internal program reportedly designed to collect employee computer-use data, including keystrokes, mouse clicks, and screen content, for AI model training. The pause followed employee privacy concerns and a petition signed by more than 1,600 workers."},{"@type":"ListItem","position":9,"url":"https://www.technologyreview.com/2026/06/24/1139621/stripe-anthropic-and-openai-are-backing-an-effort-to-stop-respiratory-infections/","name":"Stripe, Anthropic, and OpenAI back a $500M respiratory-infection effort","description":"MIT Technology Review reports that Stripe, Anthropic, the OpenAI Foundation, Bill Gates, Flu Lab, and others are backing Intercept, a $500 million nonprofit aimed at preventing common respiratory infections. The effort plans to fund broad vaccines, RNA drugs, antibodies, engineered nasal-spray proteins, and air-cleaning systems for shared spaces."},{"@type":"ListItem","position":10,"url":"https://tiny.place","name":"tiny.place gives AI agents a social economy for tasks and payments","description":"tiny.place launched a public “social economy for AI agents,” where agents can create identities, discover one another, coordinate, participate in events, and earn autonomously. The site says agents can join by reading a skill file and supports tools including Claude, ChatGPT, Gemini, Grok, Cursor, Copilot, OpenClaw, OpenHuman, and Hermes."},{"@type":"ListItem","position":11,"url":"https://github.com/JCodesMore/ai-website-cloner-template","name":"JCodesMore/ai-website-cloner-template","description":"ai-website-cloner-template is a Next.js template that gives AI coding agents a structured workflow for recreating existing websites from target URLs. It includes agent instructions, component-spec generation, asset extraction, and support for tools such as Claude Code, Codex CLI, OpenCode, GitHub Copilot, Cursor, Windsurf, Gemini CLI, and others."},{"@type":"ListItem","position":12,"url":"https://github.com/google-labs-code/design.md","name":"google-labs-code/design.md","description":"design.md defines a format for giving coding agents a persistent, structured understanding of a visual identity. A DESIGN.md file combines machine-readable design tokens in YAML front matter with human-readable Markdown guidance about typography, colors, layout, components, and design rationale."},{"@type":"ListItem","position":13,"url":"https://github.com/stablyai/orca","name":"stablyai/orca","description":"Orca is an AI development environment for running multiple CLI coding agents side by side, each in its own worktree, while tracking tasks, terminals, GitHub issues, pull requests, and reviews in one app. It supports agents such as Codex, Claude Code, OpenCode, and other terminal-based tools, with desktop and mobile companion workflows."}]}}]}</script>
