  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-18.html#webpage","name":"The Daily Intelligence — 2026-07-18","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-18.html","description":"Today’s issue moves from measurement and production engineering to the harder edges of deployment: an AI-led intrusion, destructive coding-agent mistakes and workplace resistance to robots. The practical lesson is consistent: useful AI needs measurable outcomes, scoped access and systems that assume models can fail.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-07-17T20:00:00Z","dateModified":"2026-07-18T20:05:24Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://huggingface.co/blog/security-incident-july-2026","name":"Hugging Face discloses an autonomous AI-led intrusion","description":"Hugging Face says an autonomous agent system exploited code-execution paths in its dataset-processing pipeline, moved across internal clusters and accessed some credentials and internal datasets. The company reports no evidence that public models, datasets, Spaces or its software supply chain were altered, but recommends that users rotate access tokens and review account activity."},{"@type":"ListItem","position":2,"url":"https://openai.com/index/a-scorecard-for-the-ai-age","name":"OpenAI proposes measuring AI by useful work per dollar","description":"OpenAI CFO Sarah Friar proposes an enterprise scorecard built around useful work completed, full cost per successful task, dependability and value at scale. The framework argues that token price alone misses retries, review time, rework and the actual quality of completed outcomes."},{"@type":"ListItem","position":3,"url":"https://www.patreon.com/patreon/posts/patreon-to-ai-164027757","name":"Patreon moves from requesting to enforcing limits on AI training crawlers","description":"Patreon is expanding its use of Cloudflare AI Crawl Control to block known AI training crawlers at the network level while continuing to allow search crawlers that send visitors back to creators. Patreon says early tests reduced weekly access attempts by individual training crawlers from thousands to zero."},{"@type":"ListItem","position":4,"url":"https://netflixtechblog.medium.com/in-house-llm-serving-at-netflix-a5a8e799ea2c","name":"Netflix explains how it serves large language models in-house","description":"Netflix’s AI platform teams describe an internal LLM serving stack built around vLLM, NVIDIA Triton and a shared production control plane. They expose an OpenAI-compatible HTTP interface alongside existing gRPC services, while documenting version mismatches, custom-model escape hatches and rollout trade-offs discovered under load."},{"@type":"ListItem","position":5,"url":"https://huggingface.co/blog/nvidia/scale-diffusers-finetuning-nemo-automodel","name":"NVIDIA and Hugging Face bring distributed fine-tuning to Diffusers models","description":"NVIDIA and Hugging Face have integrated NeMo Automodel with Diffusers-format image and video models. The open-source workflow can load models directly from the Hugging Face Hub, fine-tune them from one GPU to large clusters and return compatible checkpoints without model rewrites or conversion steps."},{"@type":"ListItem","position":6,"url":"https://notes.designarena.ai/how-openais-sol-finally-learned-design-taste/","name":"Design Arena finds GPT-5.6 Sol leads its single-turn web design benchmark","description":"Design Arena reports that GPT-5.6 Sol ranks first on its non-agentic web-design leaderboard, rising 18 places over GPT-5.5. Its analysis of 1,000 generated sites suggests the model suppresses familiar AI design patterns such as purple gradients and bento layouts, though it still overuses confetti and performs less well on charts."},{"@type":"ListItem","position":7,"url":"https://arstechnica.com/ai/2026/07/fear-of-humanoid-robots-spurs-human-workers-to-strike-at-hyundai-auto-factory/","name":"Hyundai workers strike as humanoid robot plans enter labour negotiations","description":"Unionised Hyundai workers in South Korea have begun partial strikes after negotiations covering pay, retirement and the company’s humanoid-robot plans failed to reach agreement. Hyundai intends to begin deploying Boston Dynamics Atlas robots in a U.S. factory in 2028 and has discussed a much larger eventual fleet across its plants."},{"@type":"ListItem","position":8,"url":"https://arxiv.org/abs/2605.18991","name":"Researchers argue that secure agents must treat the model as untrusted","description":"A security research paper argues that stronger models alone cannot make agents safe and that the model should be treated as an untrusted system component. The authors analyse 11 real-world agent attacks and propose enforcing security invariants through permissions, isolation and established systems-security techniques."},{"@type":"ListItem","position":9,"url":"https://x.com/thsottiaux/status/2077630111499882637","name":"OpenAI confirms rare GPT-5.6 file deletions in unrestricted Codex sessions","description":"OpenAI product lead Tibo Sottiaux says the company investigated a handful of cases in which GPT-5.6 unexpectedly deleted files. The reported pattern involved Codex running in Full Access Mode without sandboxing or auto review, then mistakenly deleting the home directory while trying to redefine it as temporary storage; OpenAI says it is adding guidance and harness safeguards."},{"@type":"ListItem","position":10,"url":"https://lore.kernel.org/linux-media/CAHk-=wi4zC+Ze8e+p3tMv8TtG_80KzsZ1syL9anBtmEh5Z40vg@mail.gmail.com/","name":"Linus Torvalds backs technically useful AI tools in Linux development","description":"In a Linux kernel mailing-list discussion about the Sashiko AI code-review system, Linus Torvalds said the project is not anti-AI and should judge tools on technical merit. He also acknowledged that AI can increase maintainer workload, arguing that tools must be shaped to help reviewers rather than create more noise."},{"@type":"ListItem","position":11,"url":"https://github.com/ibelick/ui-skills","name":"ibelick/ui-skills","description":"ui-skills is a fast-rising collection of reusable design-engineering skills for AI coding tools, with guidance covering interface baselines, motion and UI improvement. The TypeScript project has about 4,600 stars and was the strongest AI-related repository in today’s collected GitHub Trending results."},{"@type":"ListItem","position":12,"url":"https://github.com/lobehub/lobehub","name":"lobehub/lobehub","description":"LobeHub is an actively developed platform for organising, scheduling and monitoring teams of AI agents, with a broad self-hostable interface and model ecosystem. The repository has roughly 80,000 stars and ranked among the day’s most active AI-related GitHub Trending projects."},{"@type":"ListItem","position":13,"url":"https://github.com/n8n-io/n8n","name":"n8n-io/n8n","description":"n8n is a mature fair-code workflow automation platform combining a visual builder, custom code, AI features and more than 400 integrations. With roughly 197,000 stars and continued daily development, it was one of the most popular AI-capable repositories in today’s GitHub Trending collection."}]}}]}</script>
