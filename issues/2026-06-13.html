  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-13.html#webpage","name":"The Daily Intelligence — 2026-06-13","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-13.html","description":"Today’s issue focuses on practical AI adoption: enterprise rollouts, agent workspaces, model evaluation, cyber risk, local agents, and the open-source tools shaping how people build with AI. The useful signal is clear: AI is becoming less of a standalone chatbot and more of an operating layer for work, learning, software, and trust.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-12T20:00:00Z","dateModified":"2026-06-21T20:13:29Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://www.anthropic.com/news/tcs-anthropic-partnership","name":"Anthropic and TCS partner to bring Claude into regulated industries","description":"Anthropic announced a partnership with Tata Consultancy Services to deploy Claude across TCS and build Claude-powered offerings for financial services, healthcare, public sector, aviation, telecom, and other regulated clients. TCS plans to roll Claude out to 50,000 employees and package industry-specific workflows such as insurance claims processing and bank lending advisory."},{"@type":"ListItem","position":2,"url":"https://openai.com/index/academy-courses-applying-ai-at-work","name":"OpenAI Academy adds courses for practical AI workflows and agents at work","description":"OpenAI introduced three Academy courses: AI Foundations, Applied AI Foundations, and Agents and Workflows. The curriculum is designed to help employees move from basic prompting to repeatable AI workflows, agent direction, boundaries, checkpoints, and human review."},{"@type":"ListItem","position":3,"url":"https://openai.com/index/preply","name":"Preply shows how AI lesson summaries can support human tutoring","description":"OpenAI published a case study on Preply’s Lesson Insights feature, which uses lesson transcripts to generate summaries, grammar corrections, vocabulary notes, pronunciation feedback, and follow-up exercises. Preply says 75% of English-language learners and more than 70% of tutors use the feature."},{"@type":"ListItem","position":4,"url":"https://openai.com/index/bbva","name":"BBVA scales ChatGPT Enterprise to more than 100,000 employees","description":"OpenAI said BBVA has expanded ChatGPT Enterprise from an initial 3,000-person deployment to more than 100,000 employees globally. The bank reports more than 70% weekly active usage, around three hours saved per employee per week, and thousands of custom GPTs created across teams."},{"@type":"ListItem","position":5,"url":"https://red.anthropic.com/2026/n-days/","name":"Anthropic measures how LLM agents can speed up N-day exploit development","description":"Anthropic evaluated how modern LLM agents can turn public security patches into proof-of-concept crashes and working exploits. Its tests found that frontier models can compress some exploit-development work from expert-weeks into hours, especially for Firefox SpiderMonkey and Windows kernel patch analysis."},{"@type":"ListItem","position":6,"url":"https://developer.apple.com/videos/play/wwdc2026/232/","name":"Apple shows how to run local agentic AI on Mac with MLX","description":"Apple’s WWDC session demonstrates a local agentic AI stack using MLX, MLX-LM, and an OpenAI-compatible local server on Mac. The workflow lets coding agents and developer tools call local models, use tools, and keep inference on-device."},{"@type":"ListItem","position":7,"url":"https://huggingface.co/blog/allenai/olmo-eval","name":"Ai2 releases olmo-eval for iterative model evaluation","description":"Ai2 introduced olmo-eval, an evaluation workbench designed for the repeated model-development loop rather than one-off final benchmark reporting. It supports checkpoint comparisons, modular runtime policies, agentic and multi-turn evaluation, and statistical tools such as standard errors and minimum detectable effects."},{"@type":"ListItem","position":8,"url":"https://huggingface.co/blog/CohereLabs/introducing-north-mini-code","name":"Cohere releases North Mini Code, an open model for agentic software engineering","description":"Cohere released North Mini Code, a 30B-parameter sparse MoE model with 3B active parameters under Apache 2.0. The model is designed for agentic coding, terminal workflows, and software engineering tasks across multiple agent scaffolds."},{"@type":"ListItem","position":9,"url":"https://www.reuters.com/legal/government/google-targets-ai-powered-phishing-new-york-lawsuit-2026-06-12/","name":"Google targets AI-powered phishing in a New York lawsuit","description":"Reuters reports that Google sued the alleged makers of Outsider, a phishing kit that Google says helps criminals use AI tools to generate convincing fake sites and steal personal and financial information. Google said it detected more than 1.5 million URLs linked to Outsider between November and April."},{"@type":"ListItem","position":10,"url":"https://the-decoder.com/landmark-german-ruling-declares-googles-ai-overviews-are-googles-own-words-and-makes-it-liable-for-false-answers/","name":"German court ruling treats Google AI Overviews as Google’s own statements","description":"The Decoder reports that a Munich regional court ruled Google can be directly liable for false claims made in AI Overviews, treating the generated summaries as Google’s own content rather than ordinary search results. The case involved false allegations about two publishers and is not yet final."},{"@type":"ListItem","position":11,"url":"https://github.com/anomalyco/opencode","name":"anomalyco/opencode","description":"OpenCode is a widely used open-source AI coding agent with terminal and desktop workflows, built-in planning and build agents, broad package-manager support, and active releases. It appeared as one of the most prominent AI-related GitHub candidates in the day’s collection."},{"@type":"ListItem","position":12,"url":"https://github.com/NVIDIA/SkillSpector","name":"NVIDIA/SkillSpector","description":"SkillSpector is NVIDIA’s security scanner for AI-agent skills, checking repositories, URLs, ZIPs, directories, and SKILL.md files for vulnerabilities, malicious patterns, and supply-chain risks. It covers categories such as prompt injection, data exfiltration, privilege escalation, and MCP tool poisoning."},{"@type":"ListItem","position":13,"url":"https://github.com/maziyarpanahi/openmed","name":"maziyarpanahi/openmed","description":"OpenMed is an open-source, local-first healthcare AI toolkit for clinical named entity recognition, PII detection, de-identification, and specialized biomedical models. It supports Python, Dockerized REST APIs, batch processing, Apple MLX acceleration, and offline or air-gapped operation."}]}}]}</script>
