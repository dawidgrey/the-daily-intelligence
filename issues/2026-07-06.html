"ListItem","position":2,"url":"https://the-decoder.com/baidus-unlimited-ocr-processes-dozens-of-document-pages-in-one-pass-by-treating-memory-like-human-forgetting/","name":"Baidu’s Unlimited OCR processes long documents in one pass","description":"Baidu researchers describe Unlimited OCR, an OCR model that can process dozens of document pages in a single inference pass by using a reference sliding-window attention design. The system keeps visual and prompt tokens available while only retaining a short window of generated output tokens."},{"@type":"ListItem","position":3,"url":"https://www.reuters.com/business/healthcare-pharmaceuticals/one-small-business-ai-was-key-quick-start-expansion-2026-07-04/","name":"Reuters: one small business used AI as a startup accelerator","description":"Reuters profiles Here Now Health, a mental health platform for foster children whose founder used AI tools to learn startup practices, build a business plan, and refine investor pitches. The company launched in 2025, now employs 16 people, and is certified in three states for Medicaid-funded counseling."},{"@type":"ListItem","position":4,"url":"https://techcrunch.com/2026/07/05/amazon-will-stop-accepting-new-customers-for-mechanical-turk","name":"Amazon stops accepting new Mechanical Turk customers","description":"TechCrunch reports that Amazon will stop accepting new Mechanical Turk customers from July 30, while existing users can continue and AWS maintains security and availability. The service, once central to microtask labor and data annotation, will receive no new features."},{"@type":"ListItem","position":5,"url":"https://techcrunch.com/2026/07/04/alibaba-reportedly-bans-employees-from-using-claude-code/","name":"Alibaba reportedly bans staff from using Claude Code","description":"TechCrunch says Alibaba is reportedly banning employees from using Anthropic’s Claude Code from July 10 and directing them toward its own Qoder tool. The move follows concerns about security, access restrictions, and Anthropic’s anti-abuse measures for prohibited users."},{"@type":"ListItem","position":6,"url":"https://openai.com/index/hp-frontier-partnership","name":"OpenAI and HP expand Frontier partnership across enterprise workflows","description":"OpenAI says HP is expanding its OpenAI Frontier partnership after pilots in software development, security remediation, customer support, partner experiences, device management, and employee productivity. The partnership positions Frontier as a governance and operating layer for enterprise AI workflows."},{"@type":"ListItem","position":7,"url":"https://openai.com/index/mapping-ai-jobs-transition-eu","name":"OpenAI maps Europe’s AI workforce transition","description":"OpenAI Economic Research applied its AI Jobs Transition Framework to the EU labor market, grouping occupations by likely growth, automation potential, reorganization, or less immediate change. The report emphasizes that the categories are planning tools, not forecasts."},{"@type":"ListItem","position":8,"url":"https://the-decoder.com/mistral-ceo-mensch-says-proprietary-ai-models-give-labs-a-front-row-seat-to-your-business-processes/","name":"Mistral’s CEO warns closed AI can expose business processes","description":"The Decoder covers Mistral CEO Arthur Mensch’s argument that companies relying on closed AI models risk giving model providers visibility into sensitive business processes. The article notes the argument is relevant but also commercially aligned with Mistral’s open and sovereignty positioning."},{"@type":"ListItem","position":9,"url":"https://deepmind.google/blog/google-deepmind-and-a24-announce-first-of-its-kind-research-partnership/","name":"Google DeepMind and A24 start a research partnership for creative workflows","description":"Google DeepMind and film studio A24 announced a research partnership intended to bring filmmakers into the development of future creative AI workflows. Google also made an investment in A24, while specific technical outputs remain undefined."},{"@type":"ListItem","position":10,"url":"https://www.theverge.com/ai-artificial-intelligence/961311/anthropic-claude-science-ai-drug-development","name":"Anthropic’s Claude Science points toward AI drug discovery ambitions","description":"The Verge reports that Anthropic’s Claude Science workbench is aimed at scientific workflows and that the company has signaled interest in developing drugs, especially for neglected diseases. Experts caution that AI drug discovery is broad and still depends heavily on experiments, validation, and clinical timelines."},{"@type":"ListItem","position":11,"url":"https://github.com/anthropics/claude-code","name":"anthropics/claude-code","description":"Anthropic’s public Claude Code repository remains one of the day’s highest-signal AI developer projects, with the terminal-based coding agent, plugins, examples, and documentation active around recent releases."},{"@type":"ListItem","position":12,"url":"https://github.com/hesreallyhim/awesome-claude-code","name":"hesreallyhim/awesome-claude-code","description":"This fast-growing curated list collects Claude Code resources across skills, agents, hooks, plugins, security, observability, memory, cost monitoring, and workflow design."},{"@type":"ListItem","position":13,"url":"https://github.com/cheahjs/free-llm-api-resources","name":"cheahjs/free-llm-api-resources","description":"This repository tracks legitimate free tiers and trial credits for LLM inference APIs, including provider limits, model lists, and notes on data-use conditions."}]}}]}</script>
