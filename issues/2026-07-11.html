ay with projects for hours, and produce finished materials such as sheets, slides, documents, and web apps. The product is powered by GPT-5.6 and builds on Codex technology beyond software development."},{"@type":"ListItem","position":3,"url":"https://openai.com/index/gpt-5-6-preferred-model-microsoft-365-copilot","name":"GPT-5.6 is now the preferred model in Microsoft 365 Copilot","description":"OpenAI said GPT-5.6 will become the preferred model in Microsoft 365 Copilot across Word, Excel, PowerPoint, Copilot Chat, and Cowork. Microsoft will access the models through the OpenAI API as part of the rollout."},{"@type":"ListItem","position":4,"url":"https://openai.com/index/deutsche-telekom","name":"How Deutsche Telekom is rewiring telecommunications with AI","description":"OpenAI published a customer story on Deutsche Telekom’s push to become an AI-native telco, reporting more than 50,000 monthly active users of ChatGPT and API tooling and a 546% increase in AI tool usage since the start of 2026. The work spans employee workflows, customer service, network operations, live translation, call assistants, and post-call summaries."},{"@type":"ListItem","position":5,"url":"https://www.reuters.com/technology/artificial-intelligence/china-weighs-silicon-curtain-around-sought-after-ai-models-2026-07-08/","name":"China weighs silicon curtain around sought-after AI models","description":"Reuters reports that Beijing has discussed restricting overseas access to Chinese AI models while DeepSeek is developing its own AI chip. The story frames this alongside U.S. controls on frontier model access and growing business dependence on lower-cost Chinese open-source models."},{"@type":"ListItem","position":6,"url":"https://techcrunch.com/2026/07/10/hugging-faces-ceo-on-why-companies-are-done-renting-their-ai/","name":"Hugging Face’s CEO on why companies are done renting their AI","description":"TechCrunch interviewed Hugging Face CEO Clem Delangue about the rise of open-source AI and why companies often start with frontier APIs before shifting workloads toward open models as usage costs grow. The discussion also connects open access to concerns about concentration among a few large AI companies."},{"@type":"ListItem","position":7,"url":"https://www.technologyreview.com/2026/07/09/1140293/anthropic-found-a-hidden-space-where-claude-puzzles-over-concepts/","name":"Anthropic found a hidden space where Claude puzzles over concepts","description":"MIT Technology Review covered Anthropic’s new Jacobian lens research, which probes a hidden internal area the researchers call J-space inside Claude Opus 4.6. The work aims to reveal concepts the model is processing before it produces visible output, with a public demo made through Neuronpedia."},{"@type":"ListItem","position":8,"url":"https://bun.com/blog/bun-in-rust","name":"Rewriting Bun in Rust","description":"Bun creator Jarred Sumner wrote that Bun is being rewritten from Zig to Rust to improve stability and systematically prevent memory-safety bugs. He disclosed using a pre-release Claude Fable 5 heavily during the rewrite, reaching a passing test suite across platforms in 11 days."},{"@type":"ListItem","position":9,"url":"https://openai.com/index/bio-bug-bounty","name":"OpenAI Bio Bug Bounty","description":"OpenAI expanded its bio safety bounty into an ongoing private program focused on universal jailbreaks for biorisk safeguards, starting with GPT-5.6. The company raised the reward for a qualifying universal jailbreak from $25,000 to $50,000."},{"@type":"ListItem","position":10,"url":"https://openai.com/index/separating-signal-from-noise-coding-evaluations","name":"Separating signal from noise in coding evaluations","description":"OpenAI audited SWE-Bench Pro and estimated that roughly 30% of its tasks are broken because of issues such as overly strict tests, underspecified prompts, low test coverage, and misleading task descriptions. The company argues that flawed benchmarks can distort model capability and safety decisions."},{"@type":"ListItem","position":11,"url":"https://github.com/wonderwhy-er/DesktopCommanderMCP","name":"wonderwhy-er/DesktopCommanderMCP","description":"DesktopCommanderMCP is an MCP server that gives compatible AI assistants terminal control, file-system search, and diff-based file editing. It was one of the strongest AI-related GitHub Trending candidates in today’s collection, with recent activity and thousands of stars."},{"@type":"ListItem","position":12,"url":"https://github.com/huggingface/speech-to-speech","name":"huggingface/speech-to-speech","description":"Hugging Face’s speech-to-speech repo provides tools for building local voice agents with open-source models. Recent activity includes a realtime web demo app that speaks an OpenAI Realtime-style WebSocket protocol."},{"@type":"ListItem","position":13,"url":"https://github.com/EveryInc/compound-engineering-plugin","name":"EveryInc/compound-engineering-plugin","description":"Every’s Compound Engineering plugin is a cross-agent plugin for Claude Code, Codex, Cursor, and related coding tools. The repo is highly starred, recently active, and focused on making agentic coding workflows more portable across environments."}]}}]}</script>
