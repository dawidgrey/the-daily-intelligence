ter several months, while relative growth has been fastest in Africa, Asia, and lower-HDI countries."},{"@type":"ListItem","position":7,"url":"https://openai.com/index/introducing-genebench-pro","name":"Introducing GeneBench-Pro","description":"OpenAI introduced GeneBench-Pro, a benchmark of 129 computational-biology problems designed to test judgment-heavy scientific reasoning under ambiguity. The benchmark uses synthetic data with known causal structure so models can be assessed on realistic analytical decisions rather than simple recall."},{"@type":"ListItem","position":8,"url":"https://techcrunch.com/2026/06/30/acti-puts-ai-agents-directly-into-your-smartphone-keyboard/","name":"Acti puts AI agents directly into your smartphone keyboard","description":"Acti launched an agentic keyboard for iOS and Android that lets users trigger AI actions inside apps such as messaging, email, and social platforms. Its Skills feature lets people create custom AI shortcuts in natural language, while the company says personal context stays local by default."},{"@type":"ListItem","position":9,"url":"https://techcrunch.com/2026/06/30/x-now-offers-an-mcp-server-to-make-its-platform-easier-for-ai-tools-to-use/","name":"X now offers an MCP server to make its platform easier for AI tools to use","description":"X launched a hosted Model Context Protocol server so MCP-compatible tools such as Claude, Cursor, Grok Build, and other assistants can connect to X's API through user account permissions. TechCrunch reports that the hosted MCP does not include Write API access, so it cannot post on X."},{"@type":"ListItem","position":10,"url":"https://techcrunch.com/2026/06/30/amazon-launches-new-1-billion-fde-org-following-openai-and-anthropic/","name":"Amazon launches new $1 billion FDE org, following OpenAI and Anthropic","description":"AWS is creating a $1 billion internal organization of AI-focused forward-deployed engineers who will embed with customers to deploy purpose-built agents. The group is meant to deliver working systems while transferring AI workflows and engineering patterns to customer teams."},{"@type":"ListItem","position":11,"url":"https://github.com/logto-io/logto","name":"logto-io/logto","description":"Logto is an open-source authentication and authorization platform for SaaS and AI apps, built around OIDC, OAuth 2.1, multi-tenancy, SSO, and RBAC."},{"@type":"ListItem","position":12,"url":"https://github.com/google/agents-cli","name":"google/agents-cli","description":"Google's agents-cli provides a command-line toolkit and skills intended to help coding assistants create, evaluate, and deploy AI agents on Google Cloud."},{"@type":"ListItem","position":13,"url":"https://github.com/usestrix/strix","name":"usestrix/strix","description":"Strix is an open-source AI penetration-testing tool designed to help find and fix application vulnerabilities."}]}}]}</script>
