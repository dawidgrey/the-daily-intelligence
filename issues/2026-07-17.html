  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-17.html#webpage","name":"The Daily Intelligence — 2026-07-17","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-17.html","description":"Today’s brief follows a fast-moving split screen: large open models and national AI infrastructure on one side, and useful AI features in search, video, games, commerce and work on the other. The practical thread is clear: AI is becoming easier to shape, connect and put to work — but it still needs thoughtful boundaries.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-07-16T20:00:00Z","dateModified":"2026-07-23T20:05:12Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://blog.google/innovation-and-ai/products/gemini-notebook/notebooklm-gemini-notebook/","name":"Google renames NotebookLM to Gemini Notebook and adds a cloud computer","description":"Google is renaming NotebookLM to Gemini Notebook while keeping it as a standalone research product. The update brings deeper links to the Gemini app and Search, and adds a secure cloud computer for running code inside notebooks, with broader rollout planned for Pro users."},{"@type":"ListItem","position":2,"url":"https://www.kimi.com/it-it/blog/kimi-k3","name":"Kimi introduces K3, a 2.8T-parameter open model for long-context work","description":"Moonshot AI has introduced Kimi K3, a 2.8-trillion-parameter model with native vision and a one-million-token context window. It is available in Kimi’s consumer, work, coding and API products now; the company says full weights are due by July 27."},{"@type":"ListItem","position":3,"url":"https://blog.google/products-and-platforms/products/workspace/gemini-omni-personal-avatars/","name":"Google Vids adds Gemini Omni generation and personal avatars","description":"Google is rolling out Gemini Omni in Google Vids for prompt- and image-based video creation and conversational editing. It is also adding personal avatars, allowing users to create a digital presenter from a selfie and voice recording; generated clips carry a digital watermark."},{"@type":"ListItem","position":4,"url":"https://blog.google/products-and-platforms/products/search/connected-apps/","name":"Google Search AI Mode starts connecting to third-party apps","description":"Google is beginning a U.S. rollout that lets people securely link services including Instacart, Canva and YouTube in Search’s AI Mode. The integrations can move a grocery list to a cart, surface design templates or save a playlist without leaving the conversational search flow."},{"@type":"ListItem","position":5,"url":"https://openai.com/index/cars24/","name":"Cars24 describes using AI agents across customer conversations and internal work","description":"Cars24 says its OpenAI-powered voice and chat agents now handle more than one million conversation minutes each month across buying, selling, financing and support. The company also reports using ChatGPT Enterprise and Codex across its central organisation, including engineering, finance, legal, marketing and operations."},{"@type":"ListItem","position":6,"url":"https://openai.com/index/why-teens-deserve-access-safe-ai/","name":"OpenAI outlines teen protections and learning controls in ChatGPT","description":"OpenAI has detailed its approach to teen use of ChatGPT, including age prediction, parental controls, age-tailored guardrails and learning-focused features. Parents with linked teen accounts can now enable Study Mode by default for new chats, while OpenAI says it is continuing to expand safeguards and family tools."},{"@type":"ListItem","position":7,"url":"https://deepmind.google/blog/our-approach-to-bioresilience/","name":"Google DeepMind and Isomorphic Labs set out a bioresilience programme","description":"Google DeepMind and Isomorphic Labs have published a joint approach to bioresilience, covering prevention of model misuse and the use of AI for outbreak detection and countermeasure design. They describe more than 15 partnerships with government, biosecurity and research groups over the past year."},{"@type":"ListItem","position":8,"url":"https://about.roblox.com/newsroom/2026/07/build-without-limits-on-roblox","name":"Roblox launches Build, a mobile AI starting point for games","description":"Roblox has announced Build, a mobile-first creation tab that turns a text prompt into a basic game users can iterate on, playtest and share. The company says agentic Studio tools will begin testing on July 28 and that its discovery systems will continue to weight sustained player engagement."},{"@type":"ListItem","position":9,"url":"https://x.com/andyfang/status/2077516962515599799","name":"DoorDash opens a limited beta of dd-cli for agent-driven ordering","description":"DoorDash cofounder and CTO Andy Fang announced a limited beta of dd-cli, a command-line interface intended for developers and AI agents. The tool can search stores, compare options, build carts and hand off checkout; the beta is waitlist-only for eligible macOS developers in the U.S. and Canada."},{"@type":"ListItem","position":10,"url":"https://nvidianews.nvidia.com/news/japan-government-industrial-leaders-and-nvidia-launch-the-worlds-first-national-ai-infrastructure","name":"Japan and NVIDIA announce a national physical-AI infrastructure project","description":"NVIDIA says it is working with Noetra and Japanese industry and government partners on an AI factory for the FRONTia Project. The proposed 140-megawatt system is intended to support open multimodal foundation models for agents, digital twins, robotics and physical-AI applications across sectors including manufacturing, logistics and healthcare."},{"@type":"ListItem","position":11,"url":"https://github.com/HKUDS/DeepTutor","name":"HKUDS/DeepTutor","description":"DeepTutor is an open-source, lifelong personalised tutoring system with a knowledge centre for ingesting and managing learning materials. The repository is trending strongly and its recent release adds more granular document removal and retry handling for knowledge bases."},{"@type":"ListItem","position":12,"url":"https://github.com/moeru-ai/airi","name":"moeru-ai/airi","description":"Airi is a self-hosted, cross-platform AI companion project supporting real-time voice interaction and integrations including Minecraft and Factorio. It is available for web, macOS and Windows, and has drawn significant GitHub attention."},{"@type":"ListItem","position":13,"url":"https://github.com/PostHog/posthog","name":"PostHog/posthog","description":"PostHog’s open-source product platform combines analytics, session replay, feature flags, experiments, error tracking and logs. Its project description now frames these signals as context for AI agents to diagnose issues, uncover opportunities and ship fixes."}]}}]}</script>
