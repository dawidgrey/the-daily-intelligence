.com/business/world-at-work/companies-cutting-jobs-investments-shift-toward-ai-2026-06-29/","name":"Reuters tracks companies cutting jobs as investment shifts toward AI","description":"Reuters compiled AI-linked layoffs across sectors including banking, technology, insurance, telecoms, manufacturing, media, and consumer goods. The report frames the cuts as part of a broader shift in corporate investment toward automation, AI tooling, and efficiency programs."},{"@type":"ListItem","position":3,"url":"https://www.reuters.com/business/finance/banks-get-creative-look-further-afield-ai-fueled-debt-soars-2026-06-29/","name":"Reuters: AI infrastructure debt is reshaping corporate bond markets","description":"Reuters reports that AI-related debt is approaching 15% of U.S. investment-grade bond issuance this year, with Amazon and Alphabet issuing bonds across multiple currencies to fund AI infrastructure. Banks are also developing data-center lease-backed debt structures for AI and compute projects."},{"@type":"ListItem","position":4,"url":"https://vllm.ai/blog/2026-06-29-micro-agent-frontier-models","name":"vLLM proposes “micro-agents” inside the model-serving layer","description":"The vLLM team argues that routers can become capability-building layers, turning a single OpenAI-compatible API call into bounded collaboration among multiple models, roles, verifiers, and synthesis steps. Their Semantic Router patterns include escalation, parallel ratings, repeated mixture-of-model reasoning, and disagreement-based fusion."},{"@type":"ListItem","position":5,"url":"https://www.gov.ca.gov/2026/06/29/governor-newsom-announces-a-first-of-its-kind-partnership-providing-anthropic-tools-to-state-agencies-and-improving-services-for-californians/","name":"California makes Claude available to state agencies at a discount","description":"California announced a partnership with Anthropic to provide Claude to state agencies, with 50% discounted pricing, workforce training, technical assistance, and access pathways for local governments. The state says use cases include drafting, summarizing, cyber defense, DMV service improvements, and internal health-care workflows."},{"@type":"ListItem","position":6,"url":"https://www.bnnbloomberg.ca/business/artificial-intelligence/2026/06/26/openai-limits-its-latest-chatgpt-product-to-trump-approved-customers-during-cybersecurity-review/","name":"BNN Bloomberg/AP: OpenAI limits GPT-5.6 Sol access during U.S. review","description":"The Associated Press reports that OpenAI is limiting access to GPT-5.6 Sol to a small group of government-approved trusted partners while the U.S. reviews cybersecurity and national-security risks. OpenAI described the phased release as temporary and said the model is intended to help find and fix vulnerabilities."},{"@type":"ListItem","position":7,"url":"https://www.cnbc.com/2026/06/29/baidu-kunlunxin-hong-kong-ipo-50-billion-ai-chips.html","name":"CNBC: Baidu chip arm reportedly targets a $50B Hong Kong IPO","description":"CNBC reports that Baidu shares rose after reports that its AI chip unit Kunlunxin is targeting a Hong Kong IPO that could value the business at $50 billion. The unit has broadened beyond supplying Baidu and has drawn interest from external buyers including ByteDance, according to prior reporting."},{"@type":"ListItem","position":8,"url":"https://www.theverge.com/ai-artificial-intelligence/958751/prosecutors-chatgpt-palisades-wildfire-arson-mistrial","name":"The Verge: Prosecutors used ChatGPT logs in a wildfire arson trial","description":"The Verge reports that prosecutors introduced ChatGPT logs as evidence in a Palisades wildfire arson trial, but the jury deadlocked 10-2 for the defense and the judge declared a mistrial. One juror said ordinary chatbot use did not persuade her as evidence of guilt or intent."},{"@type":"ListItem","position":9,"url":"https://www.coderabbit.ai/blog/code-review-needs-independence","name":"CodeRabbit argues AI-written code needs independent review","description":"CodeRabbit argues that as AI coding tools generate more software, code review should be independent from the same AI stack that wrote the code. The post frames same-stack generation and review as a “grading your own homework” problem, especially for enterprise governance and compliance."},{"@type":"ListItem","position":10,"url":"https://openai.com/index/devday-2026/","name":"OpenAI announces DevDay 2026 for September 29","description":"OpenAI announced that DevDay 2026 will take place on September 29 in San Francisco and opened sign-ups for notifications. The announcement is brief, but positions the event as OpenAI’s biggest developer gathering of the year and points builders toward Codex."},{"@type":"ListItem","position":11,"url":"https://github.com/diegosouzapw/OmniRoute","name":"diegosouzapw/OmniRoute","description":"OmniRoute is a local-first AI gateway and OpenAI-compatible proxy for routing coding tools and agents across many providers, with fallback, provider pooling, compression, MCP/A2A support, and desktop/PWA options."},{"@type":"ListItem","position":12,"url":"https://github.com/facebook/astryx","name":"facebook/astryx","description":"Astryx is Meta’s open-source, agent-ready React design system with accessible components, theming, CLI tooling, templates, and documentation designed for both humans and AI coding assistants."},{"@type":"ListItem","position":13,"url":"https://github.com/vercel-labs/skills","name":"vercel-labs/skills","description":"Vercel Labs’ Skills project provides a CLI and open ecosystem for discovering, installing, creating, and using reusable agent skills across coding assistants such as Claude Code, Codex, Cursor, OpenCode, and others."}]}}]}</script>
