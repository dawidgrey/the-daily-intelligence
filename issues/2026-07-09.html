  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-09.html#webpage","name":"The Daily Intelligence — 2026-07-09","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-09.html","description":"Today’s issue follows AI systems becoming more useful in the places people actually work: live voice, managed agents, robotics, classroom planning, consumer media tools, enterprise-owned agent stacks, and the data pipelines behind them. The practical theme is control — better interfaces, more inspectable data, cheaper adaptation, and tools that keep humans in the loop.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-07-08T20:00:00Z","dateModified":"2026-07-16T20:06:35Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://openai.com/index/introducing-gpt-live/","name":"OpenAI launches GPT-Live for more natural ChatGPT Voice conversations","description":"OpenAI introduced GPT-Live, a new generation of voice models that can listen and speak at the same time, respond more naturally to interruptions, and delegate harder questions to frontier models in the background. GPT-Live-1 is rolling out to paid ChatGPT users, while GPT-Live-1 mini will power voice for free users, with API access planned later."},{"@type":"ListItem","position":2,"url":"https://blog.google/innovation-and-ai/technology/developers-tools/expanding-managed-agents-gemini-api/","name":"Google adds background execution and remote MCP support to Gemini managed agents","description":"Google expanded Managed Agents in the Gemini API with background execution, remote MCP server integration, custom function calling, and credential refresh across interactions. Developers can now run longer agent tasks asynchronously and connect cloud-sandboxed Gemini agents to remote tools and private systems through MCP."},{"@type":"ListItem","position":3,"url":"https://mistral.ai/news/robostral-navigate/","name":"Mistral introduces Robostral Navigate, an 8B robotics navigation model","description":"Mistral AI released Robostral Navigate, an 8B model for robot navigation that uses a single RGB camera and plain-language instructions. Mistral says it reaches 76.6% success on the unseen R2R-CE benchmark and generalizes across robot types without LiDAR or depth sensors."},{"@type":"ListItem","position":4,"url":"https://x.ai/news/grok-4-5","name":"xAI launches Grok 4.5 for coding, agents, and knowledge work","description":"xAI announced Grok 4.5, describing it as a frontier model aimed at coding, agentic tasks, and knowledge work. Search results and xAI documentation point to availability through xAI’s developer stack, with strong attention from builders testing model price-performance for coding agents."},{"@type":"ListItem","position":5,"url":"https://huggingface.co/blog/nvidia/open-data-for-agents","name":"NVIDIA argues open synthetic data is becoming core infrastructure for agents","description":"NVIDIA published a Hugging Face post on why agentic AI needs open data, including software-engineering traces, tool-use failures, retrieval patterns, safety data, workflow execution, and user simulation. The post highlights Nemotron data releases, synthetic data, and an interactive Prompt Atlas for exploring post-training samples."},{"@type":"ListItem","position":6,"url":"https://huggingface.co/blog/lerobot-release-v060","name":"Hugging Face ships LeRobot v0.6.0 with world models, reward APIs, and rollout tooling","description":"LeRobot v0.6.0 adds world-model policies, new vision-language-action models, reward-model APIs, six simulation benchmarks, a lerobot-rollout CLI, human-in-the-loop corrections, cloud training on HF Jobs, depth support, and faster dataset loading. The release focuses on closing the loop from robot failures back into better training data."},{"@type":"ListItem","position":7,"url":"https://pytorch.org/blog/miles-a-pytorch-native-stack-for-large-scale-llm-rl-post-training/","name":"PyTorch features Miles, an open stack for large-scale LLM reinforcement learning","description":"The PyTorch blog detailed Miles, RadixArk’s open-source framework for large-scale LLM reinforcement-learning post-training. Miles combines SGLang rollouts, Megatron-LM training, Ray orchestration, PyTorch extensibility, low-precision recipes, MoE alignment, observability, and fault tolerance."},{"@type":"ListItem","position":8,"url":"https://openai.com/index/k-12-educators-practical-skills","name":"OpenAI brings hands-on AI Skills Jams to K–12 educators","description":"OpenAI Academy and the Walton Family Foundation are hosting hands-on AI Skills Jams for more than 1,600 K–12 educators and school leaders across U.S. cities. The workshops focus on practical uses such as lesson planning, parent communication, administrative tasks, and responsible classroom adoption."},{"@type":"ListItem","position":9,"url":"https://techcrunch.com/2026/07/08/google-photos-adds-a-new-ai-video-remix-tool/","name":"Google Photos adds AI Video Remix for quick consumer video edits","description":"TechCrunch reports that Google Photos is rolling out an AI Video Remix feature powered by Gemini Omni. Eligible subscribers can relight videos, change backgrounds, or apply artistic styles from the Create tab in supported countries."},{"@type":"ListItem","position":10,"url":"https://techcrunch.com/2026/07/08/prime-intellect-raises-130m-series-a-to-help-enterprises-build-their-own-ai-agents/","name":"Prime Intellect raises $130M to help enterprises build their own AI agents","description":"Prime Intellect raised a $130 million Series A at a reported $1 billion valuation to provide compute, reinforcement-learning infrastructure, and evaluation tools for companies building their own AI agents. TechCrunch reports customers include Ramp and Zapier, with the startup positioning itself as a way for enterprises to refine models for proprietary workflows."},{"@type":"ListItem","position":11,"url":"https://github.com/microsoft/SkillOpt","name":"microsoft/SkillOpt","description":"SkillOpt is a Microsoft research project for improving frozen LLM agents by optimizing reusable natural-language skills from trajectories, validation gates, and deployable best_skill.md artifacts. The repository is trending with roughly 11.6k stars and a recent v0.2.0 release focused on SkillOpt-Sleep and cross-tool backends."},{"@type":"ListItem","position":12,"url":"https://github.com/jingyaogong/minimind","name":"jingyaogong/minimind","description":"MiniMind is a compact educational LLM project that shows how to train a roughly 64M-parameter model from scratch, with code covering pretraining, supervised fine-tuning, LoRA, RLHF-style methods, tool use, agentic RL, distillation, and related workflows. The repository is highly starred and appeared prominently in today’s AI-related GitHub candidates."},{"@type":"ListItem","position":13,"url":"https://github.com/anthropics/claude-cookbooks","name":"anthropics/claude-cookbooks","description":"Claude Cookbooks is Anthropic’s public collection of notebooks and recipes for using Claude across capabilities, agent SDK patterns, evaluation, RAG, classification, and workflow design. The repository has tens of thousands of stars and recent activity around multi-agent coordinator cost patterns."}]}}]}</script>
