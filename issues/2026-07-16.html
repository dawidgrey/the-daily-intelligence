  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-16.html#webpage","name":"The Daily Intelligence — 2026-07-16","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-07-16.html","description":"Today’s issue tracks a practical turn in AI: a new open model built to customize, tools for coordinating coding agents, stronger evaluation for voice systems, and the infrastructure and cost controls needed to run all of it. We also round up three AI repositories leading GitHub Trending.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-07-15T20:00:00Z","dateModified":"2026-07-20T20:06:21Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://openai.com/supply/co-lab/work-louder/","name":"OpenAI and Work Louder launch Codex Micro control pad","description":"OpenAI and Work Louder have released the $230 Codex Micro, a compact programmable keyboard for ChatGPT Codex. Its dedicated controls and RGB status lights are designed to surface agent state and launch common coding workflows such as review, debugging and refactoring."},{"@type":"ListItem","position":2,"url":"https://thinkingmachines.ai/news/introducing-inkling/","name":"Thinking Machines releases Inkling, a 975B open-weights multimodal model","description":"Thinking Machines Lab has released Inkling’s weights: a mixture-of-experts model with 975B total parameters and 41B active parameters, supporting text, image and audio input with up to a one-million-token context window. The company positions it as a customizable foundation model and offers fine-tuning through Tinker."},{"@type":"ListItem","position":3,"url":"https://openai.com/index/unlocking-self-improvement-gpt-red","name":"OpenAI describes GPT-Red, an automated red-team model","description":"OpenAI says it trained GPT-Red to find vulnerabilities, especially prompt-injection failures, and then used the resulting attacks to train GPT-5.6. The company reports six times fewer failures on its hardest direct prompt-injection benchmark than its best production model four months earlier."},{"@type":"ListItem","position":4,"url":"https://www.anthropic.com/research/claude-values-models-languages","name":"Anthropic maps how Claude’s expressed values vary by model and language","description":"Anthropic analyzed 309,815 anonymized Claude conversations and condensed variation in expressed values into four axes: deference versus caution, warmth versus rigor, depth versus brevity, and candor versus execution. It found meaningful differences across model versions and among the 20 most-used Claude languages."},{"@type":"ListItem","position":5,"url":"https://cohere.com/blog/the-total-cost-of-ai-ownership","name":"Cohere argues AI costs must be measured as total system cost","description":"Cohere’s new guide argues that token prices obscure the real cost of AI systems, which also includes context size, retries, tool calls, latency requirements, utilization, security and infrastructure. It frames the ownership-versus-rental decision as a workload and control question rather than a simple API-price comparison."},{"@type":"ListItem","position":6,"url":"https://news.microsoft.com/source/2026/07/15/3m-and-microsoft-announce-strategic-partnership-to-advance-ai-data-center-infrastructure-and-enterprise-transformation/","name":"Microsoft and 3M pair data-center optics with agent-driven back-office work","description":"Microsoft and 3M announced a partnership that will deploy 3M’s Expanded Beam Optical technology in Azure data centers while using Microsoft AI in 3M operations. One planned workflow applies AI agents to customer-order processes including credit checks, delinquency assessment and system updates, with approvals and monitoring."},{"@type":"ListItem","position":7,"url":"https://www.atlassian.com/blog/company-news/ai-sdlc","name":"Atlassian adds agent coordination, observability and cost controls to Jira","description":"Atlassian has announced Jira features for planning agent-ready work, assigning tasks to Claude Code, Cursor and GitHub Copilot, tracking agent sessions, and automating routine engineering loops. The release also adds cost-management features intended to map AI spend and token use to teams, projects and pull requests."},{"@type":"ListItem","position":8,"url":"https://huggingface.co/blog/real-world-voiceeq","name":"Real World VoiceEQ tests whether voice AI feels human in real conversations","description":"Hume AI has published Real World VoiceEQ, a benchmark covering more than 40 voice models across 15-plus evaluation dimensions and 60-plus metrics. Built from more than one million human ratings, it measures qualities that transcripts miss, including emotion, speaker identity, noise robustness and conversational response."},{"@type":"ListItem","position":9,"url":"https://huggingface.co/blog/ibm-research/model-routing-is-simple-until-it-isnt","name":"IBM Research: model routing is a systems problem, not a price-sheet lookup","description":"IBM Research reports that routing agent tasks by headline model price or apparent difficulty can miss the actual cost and latency effects of caching, workload patterns, infrastructure and governance requirements. In its AppWorld experiment, its optimization-based router traded cost, accuracy and latency across configurations rather than picking a single model per task class."},{"@type":"ListItem","position":10,"url":"https://huggingface.co/blog/allenai/shippy-tech-blog","name":"Ai2 shares the architecture behind Shippy, a maritime decision-support agent","description":"Ai2 explains how its Shippy maritime-awareness agent combines versioned skills, a typed API, a purpose-built command-line interface, isolated sessions and task-specific evaluations against live data. The agent is designed to show sources and limits, while avoiding legal determinations or unsupported speculation."},{"@type":"ListItem","position":11,"url":"https://github.com/HenryNdubuaku/maths-cs-ai-compendium","name":"HenryNdubuaku/maths-cs-ai-compendium","description":"This fast-rising TypeScript repository is a structured compendium for aspiring AI and machine-learning research engineers, covering mathematics, computer science, machine learning, vision, speech, autonomous systems and production software engineering. It had about 5.7k stars at review time and was the leading AI-related project in the day’s GitHub Trending collection."},{"@type":"ListItem","position":12,"url":"https://github.com/microsoft/markitdown","name":"microsoft/markitdown","description":"Microsoft’s MarkItDown converts office documents and other files into Markdown, a format that is easier to feed into LLM and retrieval workflows. The Python project had about 166k stars at review time and was among the most popular AI-adjacent repositories in GitHub Trending."},{"@type":"ListItem","position":13,"url":"https://github.com/browseros-ai/BrowserOS","name":"browseros-ai/BrowserOS","description":"BrowserOS is an open-source agentic browser project positioned as an alternative to browser-integrated AI products. The project supports local and hosted model connections and had about 12.2k stars at review time, placing it among the day’s strongest AI-related trending repositories."}]}}]}</script>
