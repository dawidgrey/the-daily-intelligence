  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-19.html#webpage","name":"The Daily Intelligence — 2026-06-19","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-19.html","description":"Today’s issue tracks a practical turn in AI: agents are showing up in ad operations, biomedical research, email infrastructure, software tuning, robotics, and model orchestration. The signal is less about chatbots getting flashier and more about AI systems being wired into work that people already do.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-18T20:00:00Z","dateModified":"2026-07-18T20:05:24Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://www.anthropic.com/research/project-fetch-phase-two","name":"Anthropic says Claude Opus 4.7 completed robot-dog tasks far faster than human teams","description":"Anthropic reran its Project Fetch robotics experiment with Claude Opus 4.7 operating through Claude Code. The model completed several robodog setup and control tasks much faster than the original human teams, though it still struggled with precise physical fetching."},{"@type":"ListItem","position":2,"url":"https://pytorch.org/blog/from-minutes-to-seconds-llm-guided-autotuning-for-helion-kernels/","name":"PyTorch shows how LLMs can cut Helion kernel autotuning from minutes to seconds","description":"PyTorch introduced an LLM-guided autotuning approach for Helion kernels, using a model to propose promising GPU kernel configurations before benchmarking. In its tests, the method reached near-baseline performance while trying about 10 times fewer configurations and reducing tuning wall-clock time by about 6.7 times."},{"@type":"ListItem","position":3,"url":"https://searchengineland.com/google-launches-ai-agent-for-ad-manager-480613","name":"Google brings a Gemini-powered agent into Ad Manager","description":"Google is rolling out Ask Ad Manager, a Gemini-powered assistant for publishers using Google Ad Manager. The beta lets users ask natural-language questions about performance, troubleshoot delivery problems, generate reports, and navigate the platform."},{"@type":"ListItem","position":4,"url":"https://www.manifold.ai/resources/agent-os-launch","name":"Manifold launches Agent OS for governed life-sciences AI workflows","description":"Manifold announced Agent OS deployments with Foundation Medicine and the University of Virginia Comprehensive Cancer Center. The platform is aimed at secure, auditable agentic workflows across genomic, clinical, and real-world biomedical data."},{"@type":"ListItem","position":5,"url":"https://atomicmail.io/agents","name":"Atomic Mail offers email inboxes built specifically for AI agents","description":"Atomic Mail is offering an open-alpha email service for AI agents, with inbox creation, send/receive workflows, JMAP and REST APIs, MCP support, and an AgentSkill package. The product also uses proof-of-work and reputation mechanisms intended to reduce agent-driven spam abuse."},{"@type":"ListItem","position":6,"url":"https://developer.nvidia.com/blog/nvidia-nemotron-3-ultra-powers-faster-more-efficient-reasoning-for-long-running-agents/","name":"NVIDIA releases Nemotron 3 Ultra for long-running agent workflows","description":"NVIDIA detailed Nemotron 3 Ultra, an open 550B-parameter mixture-of-experts model with 55B active parameters. The model is designed for frontier reasoning and orchestration in long-running agent systems, with NVIDIA claiming higher throughput and lower task-completion cost than comparable open models."},{"@type":"ListItem","position":7,"url":"https://www.consumerreports.org/money/questionable-business-practices/uber-lyft-different-prices-for-same-ride-and-fake-discounts-a1093538909/","name":"Consumer Reports finds large ride-price differences in Uber and Lyft testing","description":"Consumer Reports tested Uber and Lyft prices with volunteers across 18 states and found substantial price differences for the same routes requested at nearly the same time. The investigation also flagged cases where advertised discounts appeared to be based on inflated reference prices."},{"@type":"ListItem","position":8,"url":"https://developers.openai.com/blog/designing-delightful-frontends-with-gpt-5-4","name":"OpenAI publishes frontend design guidance for GPT-5.4","description":"OpenAI’s developer blog says GPT-5.4 is better at generating visually polished and functional frontends, especially when given clear design constraints, references, and verification tools such as Playwright. The post includes practical prompting rules to avoid generic layouts and improve brand-specific UI work."},{"@type":"ListItem","position":9,"url":"https://www.reuters.com/technology/googles-gemini-co-lead-noam-shazeer-join-openai-2026-06-18/","name":"Reuters: Gemini co-lead Noam Shazeer is leaving Google for OpenAI","description":"Reuters reports that Noam Shazeer, a Google vice president of engineering and co-lead of Gemini, said he is leaving Google to join OpenAI. The move comes less than two years after Google reportedly paid heavily to bring Shazeer and a team back from Character.AI."},{"@type":"ListItem","position":10,"url":"https://www.prnewswire.com/news-releases/introducing-eno-genesis-ais-first-general-purpose-robot-is-challenging-traditional-humanoid-design-302801103.html","name":"Genesis AI unveils Eno, a non-humanoid general-purpose robot powered by GENE","description":"Genesis AI introduced Eno, a compact wheeled general-purpose robot powered by its GENE robotics foundation model. The company says the robot is designed for factories, labs, hospitals, logistics, and service settings, with targeted customer deployments planned by the end of 2026."},{"@type":"ListItem","position":11,"url":"https://github.com/Kilo-Org/kilocode","name":"Kilo-Org/kilocode","description":"Kilo Code is an open-source agentic engineering platform and coding agent that works across VS Code, JetBrains IDEs, the CLI, and cloud workflows. It supports hundreds of models and includes modes for coding, planning, debugging, review, and codebase assistance."},{"@type":"ListItem","position":12,"url":"https://github.com/calesthio/OpenMontage","name":"calesthio/OpenMontage","description":"OpenMontage is an open-source agentic video production system that coordinates research, scripting, asset generation, editing, composition, QA, and rendering. It is designed to let coding assistants such as Claude Code, Cursor, Copilot, Windsurf, and Codex operate a full video workflow."},{"@type":"ListItem","position":13,"url":"https://github.com/anthropics/financial-services","name":"anthropics/financial-services","description":"Anthropic’s financial-services repository packages Claude agents, skills, slash commands, MCP data connectors, and deployment tooling for workflows across investment banking, equity research, private equity, wealth management, fund administration, and finance operations."}]}}]}</script>
