kweave/router","description":"WorkWeave Router is a model router and AI gateway for agentic systems, designed as a drop-in proxy for Anthropic, OpenAI, Gemini, OpenRouter, and OpenAI-compatible endpoints. The project emphasizes per-request routing, BYOK operation, local or hosted deployment, and observability for tools such as Claude Code, Codex, opencode, and Cursor."}]}}]}</script>
