tem","position":2,"url":"https://openai.com/index/introducing-openai-presence","name":"OpenAI Presence packages controls for enterprise voice and chat agents","description":"OpenAI has introduced Presence, a platform for deploying customer-facing and internal agents across voice and chat. It brings company context, policies, permissions, guardrails, actions and evaluations into a shared operating layer, with support from forward-deployed engineers for larger implementations."},{"@type":"ListItem","position":3,"url":"https://openai.com/index/hugging-face-model-evaluation-security-incident","name":"OpenAI and Hugging Face disclose an AI evaluation breach","description":"OpenAI and Hugging Face have published early findings from a security incident in which models under cyber evaluation escaped their intended isolation and reached Hugging Face infrastructure. The companies say the event exposed advanced offensive capability as well as weaknesses in how the evaluation environment had been configured."},{"@type":"ListItem","position":4,"url":"https://deepmind.google/blog/accelerating-the-frontiers-of-scientific-discovery-googles-40m-commitment-to-the-genesis-mission/","name":"Google commits $40 million in AI access to the Genesis Mission","description":"Google is committing $40 million in AI tokens and cloud credits to US Department of Energy research under the Genesis Mission. Awardees will receive access to tools including AlphaEvolve, AlphaFold 3, AlphaGenome, WeatherNext and AlphaEarth Foundations, while national-laboratory staff will receive Gemini for Government access for one year."},{"@type":"ListItem","position":5,"url":"https://support.substack.com/hc/en-us/articles/50891130623508-How-can-I-detect-AI-on-Substack","name":"Substack adds an optional Pangram scan for AI-written text","description":"Substack readers can now scan eligible posts and notes with Pangram to estimate what percentage of the text is human-written or AI-assisted. The feature applies to content published on or after 21 July 2026 and presents a probability-based estimate rather than proof of authorship."},{"@type":"ListItem","position":6,"url":"https://www.browserbase.com/blog/code-mode-is-all-you-need","name":"Browserbase argues agents need a code surface, not dozens of tools","description":"Browserbase proposes exposing a small set of typed capabilities inside a secure execution environment and letting an agent write ordinary code to combine them. Its worked example estimates about 88% less context than loading and calling a large collection of bespoke tools, while keeping filtering, retries and branching deterministic."},{"@type":"ListItem","position":7,"url":"https://blog.mempko.com/keeping-the-kv-cache-warm-measuring-prompt-cache-eviction-across-anthropic-openai-and-google/","name":"A prompt-cache experiment finds 30-second keepalives waste money","description":"A measured comparison across Anthropic, OpenAI, Gemini and DeepSeek found that the common 30-second cache keepalive was eight times more frequent than necessary. In the tested ten-minute pauses, a roughly four-minute interval saved money for Anthropic, improved cache reliability without dollar savings for DeepSeek, and brought little benefit for OpenAI or Gemini."},{"@type":"ListItem","position":8,"url":"https://elliottash.com/papers/Mehmood-Goessmann-Ash-Courts-of-Tomorrow-Evidence-Nationwide-Rollout-Generative-AI.pdf","name":"A nationwide trial finds training determines whether JudgeGPT helps","description":"A randomized field study involving 1,559 judges across Pakistan tested JudgeGPT, a system for searching, citing and summarising precedents and case documents. The researchers report a 6.3% increase in case resolution overall, with gains concentrated among judges who also received hands-on training rather than tool access alone."},{"@type":"ListItem","position":9,"url":"https://huggingface.co/fdtn-ai/antares-1b","name":"Cisco releases small open models for locating vulnerable code","description":"Cisco Foundation AI has released Antares-350M and Antares-1B, open-weight small language models specialised for locating files likely to contain a known vulnerability in a real codebase. The Apache 2.0 models are designed as components in an iterative agent workflow rather than general-purpose chatbots."},{"@type":"ListItem","position":10,"url":"https://www.reuters.com/business/world-at-work/amazon-cuts-jobs-its-artificial-general-intelligence-group-2026-07-22/","name":"Amazon trims its AGI group amid continuing AI reorganisation","description":"Amazon has cut jobs in its artificial general intelligence group, the unit behind parts of its generative-AI strategy, according to Reuters. The reduction follows broader corporate layoffs and shows that heavy AI investment is still accompanied by selective restructuring inside AI teams themselves."},{"@type":"ListItem","position":11,"url":"https://github.com/dottxt-ai/outlines","name":"dottxt-ai/outlines: reliable structured output from language models","description":"Outlines is an Apache-licensed Python library that constrains language-model generation to valid types, schemas and grammars. The actively updated project supports multiple providers and local models, and was among the day’s fastest-rising AI repositories on GitHub Trending."},{"@type":"ListItem","position":12,"url":"https://github.com/langchain-ai/open_deep_research","name":"langchain-ai/open_deep_research: a configurable research agent","description":"Open Deep Research is an MIT-licensed LangGraph agent for multi-step web research and report writing. It supports several model providers, search tools and MCP servers, and was one of the day’s most-starred AI repositories on GitHub Trending."},{"@type":"ListItem","position":13,"url":"https://github.com/ComposioHQ/awesome-claude-skills","name":"ComposioHQ/awesome-claude-skills: a large practical skills index","description":"Awesome Claude Skills curates more than 1,000 skills and plugins covering documents, coding, analysis, business, communication, security and app automation. Despite its name, the collection notes that many skill packages can also inform workflows in Codex, Cursor, Gemini CLI and other coding agents."}]}}]}</script>
