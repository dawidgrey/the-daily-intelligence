  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-18.html#webpage","name":"The Daily Intelligence — 2026-06-18","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-18.html","description":"Today’s issue is about AI leaving the novelty layer and entering working systems: coding agents inside Slack, models built for long-horizon work, agent discovery standards, safer deployment testing, and practical AI in homes, labs, robots, planning offices, and internal app development.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-17T20:00:00Z","dateModified":"2026-06-25T20:12:25Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://block.xyz/inside/block-rolls-out-builderbot-a-new-suite-of-ai-native-tools-that-changes-the-way-we-ship","name":"Block rolls out Builderbot, a Slack-native system for coordinating coding agents","description":"Block says Builderbot coordinates multiple AI agents across its codebase from Slack threads, handling research, branches, pull requests, CI feedback, and iterative changes. The company says it now executes more than 200,000 operations a day and merges about 1,500 Builderbot-assisted pull requests per week."},{"@type":"ListItem","position":2,"url":"https://www.apodex.com/blog/apodex-1.0","name":"Apodex-1.0 emphasizes verified deep research with multi-agent evidence checking","description":"Apodex introduced Apodex-1.0, a deep-research model usable as a ReAct agent, and Apodex-1.0-H, a heavy-duty mode that coordinates asynchronous teams of specialized agents and verifiers. The company says the system backs final reports with explicit evidence chains and audits claims before delivery."},{"@type":"ListItem","position":3,"url":"https://openai.com/index/ai-chemist-improves-reaction","name":"OpenAI reports a near-autonomous AI chemistry workflow improved a drug-making reaction","description":"OpenAI connected GPT-5.4 with Molecule.one’s Maria system and a high-throughput lab to improve a Chan–Lam coupling reaction used in medicinal chemistry. The team says the workflow found TEMPO-based conditions that improved yields for most tested substrates, while human chemists still reviewed and steered the process."},{"@type":"ListItem","position":4,"url":"https://openai.com/index/deployment-simulation","name":"OpenAI details Deployment Simulation for testing model behavior before launch","description":"OpenAI described Deployment Simulation, a safety-evaluation method that replays real prior conversations in a privacy-preserving way and regenerates responses with a candidate model before release. The company says it helped estimate undesired behavior rates and surface issues in GPT-5-series deployments, including agentic settings."},{"@type":"ListItem","position":5,"url":"https://retool.com/blog/retool-launches-react-ai-app-builder","name":"Retool launches a React AI app builder aimed at production governance","description":"Retool launched a full-stack React AI app builder that lets teams bring apps from tools such as Claude Code, Codex, Replit, Lovable, v0, local repos, or Retool’s editor into Retool’s governed runtime. The pitch is that AI-generated apps should inherit authentication, permissions, audit logs, environments, and lifecycle controls before production use."},{"@type":"ListItem","position":6,"url":"https://huggingface.co/blog/agentic-resource-discovery-launch","name":"Hugging Face proposes Agentic Resource Discovery for finding tools, skills, and agents","description":"Hugging Face introduced Agentic Resource Discovery, an open draft specification for letting agents search registries of tools, skills, MCP servers, apps, and other agents at runtime. The effort includes contributors from Microsoft, Google, GoDaddy, Hugging Face, and others, plus a Hugging Face Discover reference implementation."},{"@type":"ListItem","position":7,"url":"https://huggingface.co/blog/amazon/strands-lerobot-hub-to-hardware","name":"Strands Robots connects Hugging Face LeRobot workflows to agent-controlled hardware","description":"A Hugging Face post from Amazon contributors explains Strands Robots, an Apache-2.0 orchestration layer that exposes LeRobot-compatible robots as tools for Strands agents. The workflow can record demonstrations, produce LeRobotDatasets, run policies in simulation, and switch similar code to real robot hardware."},{"@type":"ListItem","position":8,"url":"https://deepmind.google/blog/unlocking-uk-house-building-with-ai-accelerated-planning/","name":"Google DeepMind and the UK government test Gemini for faster planning applications","description":"Google DeepMind says it is working with the UK government, Google Cloud, Faculty, and local authorities in Barnet, Dorset, and Camden on a Gemini-powered planning prototype. The tool is intended to extract site information, identify relevant policies, summarize consultation feedback, and draft assessment reports while planning officers keep final authority."},{"@type":"ListItem","position":9,"url":"https://www.anthropic.com/research/claude-code-expertise","name":"Anthropic study finds domain expertise still matters in agentic coding","description":"Anthropic analyzed roughly 400,000 Claude Code sessions from about 235,000 users and found a division of labor: people make most planning decisions, while Claude makes most execution decisions. The study argues that domain expertise often matters more than formal coding background when using coding agents effectively."},{"@type":"ListItem","position":10,"url":"https://blog.google/products-and-platforms/devices/google-nest/google-home-speaker-gemini-features/","name":"Google introduces a Gemini-first Google Home Speaker","description":"Google announced a $99.99 Google Home Speaker built for Gemini for Home, with preorders open and retail availability planned for June 25. The device supports more natural smart-home commands, multi-step requests, mid-sentence corrections, Continued Conversation, and optional Google Home Premium features such as Gemini Live and camera history search."},{"@type":"ListItem","position":11,"url":"https://github.com/google-research/timesfm","name":"google-research/timesfm","description":"TimesFM is Google Research’s pretrained foundation model for time-series forecasting, with recent packaging and example updates and integrations across Google products such as BigQuery ML and Sheets workflows."},{"@type":"ListItem","position":12,"url":"https://github.com/PaddlePaddle/PaddleOCR","name":"PaddlePaddle/PaddleOCR","description":"PaddleOCR is a large open-source OCR and document AI toolkit for turning PDFs and images into structured text, Markdown, or JSON for LLM, RAG, and agent workflows. Its current positioning emphasizes multilingual OCR, document parsing, tables, formulas, charts, and production deployment options."},{"@type":"ListItem","position":13,"url":"https://github.com/earendil-works/pi","name":"earendil-works/pi","description":"Pi is a TypeScript monorepo for an AI agent toolkit, including a unified multi-provider LLM API, agent runtime, terminal UI components, and an interactive coding-agent CLI. The project has active releases and positions itself as a self-extensible coding agent harness."}]}}]}</script>
