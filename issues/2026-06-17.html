  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://lacbgrey.com.au/#organization","name":"LACB Grey","url":"https://lacbgrey.com.au/"},{"@type":"WebSite","@id":"https://dailyintelligence.lacbgrey.com.au/#website","name":"The Daily Intelligence","url":"https://dailyintelligence.lacbgrey.com.au/","publisher":{"@id":"https://lacbgrey.com.au/#organization"},"inLanguage":"en-AU"},{"@type":"CollectionPage","@id":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-17.html#webpage","name":"The Daily Intelligence — 2026-06-17","url":"https://dailyintelligence.lacbgrey.com.au/issues/2026-06-17.html","description":"Today’s issue tracks a practical shift: new models are stretching long-running work, while agent products are moving into websites, customer service, finance, security, analytics, and software testing. The useful question is less whether agents are coming, and more where guardrails, context, and human review need to sit.","isPartOf":{"@id":"https://dailyintelligence.lacbgrey.com.au/#website"},"publisher":{"@id":"https://lacbgrey.com.au/#organization"},"datePublished":"2026-06-16T20:00:00Z","dateModified":"2026-06-26T20:16:58Z","inLanguage":"en-AU","image":"https://dailyintelligence.lacbgrey.com.au/og-image.png","mainEntity":{"@type":"ItemList","numberOfItems":13,"itemListElement":[{"@type":"ListItem","position":1,"url":"https://z.ai/blog/glm-5.2","name":"GLM-5.2 pushes open models toward long-horizon coding work","description":"Z.ai introduced GLM-5.2, an MIT-licensed flagship model focused on long-horizon tasks, coding agents, and a stable 1M-token context window. The company says architectural changes such as IndexShare reduce long-context attention cost while improving coding and agentic benchmarks."},{"@type":"ListItem","position":2,"url":"https://www.tno.nl/en/digital/artificial-intelligence/gpt-nl/","name":"GPT-NL shows how sovereign AI can be built around local language, law, and data rights","description":"TNO, SURF, and the Netherlands Forensic Institute are building GPT-NL, a Dutch language model trained from scratch with an emphasis on transparency, lawful data use, controlled licensing, and public values. The project frames sovereignty as a practical issue of governance, provenance, privacy, and value sharing."},{"@type":"ListItem","position":3,"url":"https://www.businesswire.com/news/home/20260616909966/en/","name":"Framer adds AI agents directly inside production website workflows","description":"Framer launched Framer Agents, External Agents, Branching, and a new community layer for creating and maintaining production websites inside the Framer canvas. The agents can edit pages, components, styles, CMS content, SEO settings, and publishing workflows while teams review changes before shipping."},{"@type":"ListItem","position":4,"url":"https://openrouter.ai/blog/announcements/fusion-beats-frontier/","name":"OpenRouter Fusion turns multiple models into a single research answer","description":"OpenRouter detailed Fusion, a server-side system that sends a prompt to a panel of models, lets them research in parallel, and uses a synthesizer model to combine their outputs. In OpenRouter’s DRACO evaluation, selected model panels outperformed several individual frontier models on complex research tasks."},{"@type":"ListItem","position":5,"url":"https://about.fb.com/news/2026/06/meta-business-agent/","name":"Meta expands Business Agent for customer conversations across messaging apps","description":"Meta announced Meta Business Agent and an enterprise Business Agent Platform for customer support, product recommendations, appointment booking, lead qualification, and business-message summaries. Meta says more than one million businesses are already using a Business Agent on WhatsApp and Messenger, with expansion to Instagram."},{"@type":"ListItem","position":6,"url":"https://techcrunch.com/2026/06/11/coinbase-debuts-mcp-for-agent-trading/","name":"Coinbase for Agents lets AI assistants trade and pay within user-set limits","description":"Coinbase launched Coinbase for Agents, allowing AI assistants such as ChatGPT and Claude to connect to Coinbase accounts, trade crypto, access market tools, and pay for research or compute through the x402 protocol. Coinbase says users can use their main account or a sandbox, with custom limits planned."},{"@type":"ListItem","position":7,"url":"https://www.ito.ai","name":"Ito tests pull requests by running the app, not just reading code","description":"Ito is positioning itself as an agentic QA platform that deploys an application in an isolated browser environment and tests pull requests for behavioral regressions, broken flows, UI issues, and runtime failures. The product reports findings with screenshots, video, and PR-level QA details."},{"@type":"ListItem","position":8,"url":"https://arxiv.org/abs/2606.15708","name":"The 2026 AI Index highlights the gap between capability and preparedness","description":"The Artificial Intelligence Index Report 2026 argues that AI capabilities are advancing faster than governance frameworks, evaluation methods, education systems, and impact-measurement infrastructure. This edition adds more coverage of economic value, labor-market effects, AI sovereignty, science, and medicine."},{"@type":"ListItem","position":9,"url":"https://www.appviewx.com/news/appviewx-launches-agent-identity-security-to-govern-agents-for-the-ai-and-quantum-era/","name":"AppViewX launches identity security for enterprise AI agents","description":"AppViewX launched Agent Identity Security, a product for discovering, governing, securing, and monitoring AI agents across enterprises. It combines AI agent governance with machine-identity and PKI controls, including an AI bill of materials, policy enforcement, and anomalous-behavior detection."},{"@type":"ListItem","position":10,"url":"https://www.fullstory.com/fullstory-launches-new-solutions-to-power-intelligent-digital-experiences/","name":"Fullstory brings behavioral data into AI tools with MCP and StoryAI Agents","description":"Fullstory introduced Fullstory MCP, StoryAI Agents, and Workflow Intelligence to connect behavioral analytics with AI tools such as Claude, ChatGPT, Cursor, and Gemini. The products are designed to detect user friction, investigate sessions, answer analytics questions, and surface internal workflow bottlenecks."},{"@type":"ListItem","position":11,"url":"https://github.com/Egonex-AI/Understand-Anything","name":"Egonex-AI/Understand-Anything turns codebases into explorable knowledge graphs","description":"Understand Anything analyzes codebases, documentation, and knowledge bases to build interactive graphs of files, functions, classes, dependencies, and domain concepts. It works alongside tools such as Claude Code, Codex, Cursor, Copilot, and Gemini CLI."},{"@type":"ListItem","position":12,"url":"https://github.com/OpenBMB/VoxCPM","name":"OpenBMB/VoxCPM offers open multilingual voice generation and cloning","description":"VoxCPM2 is an open-source, tokenizer-free text-to-speech system for multilingual speech generation, voice design, controllable voice cloning, and streaming audio. The project supports 30 languages, 48kHz output, and commercial-ready Apache-2.0 licensing."},{"@type":"ListItem","position":13,"url":"https://github.com/datawhalechina/hello-agents","name":"datawhalechina/hello-agents teaches agent building from first principles","description":"Hello-Agents is a structured, free learning project covering AI agent theory, ReAct-style patterns, low-code platforms, agent frameworks, memory, RAG, context engineering, protocols, evaluation, and practical multi-agent projects. It includes code, tutorials, and complete learning paths."}]}}]}</script>
