norm/","name":"OpenAI limits GPT-5.6 rollout after a U.S. government request","description":"OpenAI is initially limiting GPT-5.6 access to a small set of trusted partners after a U.S. government request, according to TechCrunch. The lineup includes Sol, Terra, and Luna, with OpenAI saying the process should not become the long-term default."},{"@type":"ListItem","position":3,"url":"https://techcrunch.com/2026/06/27/asian-ai-startups-launch-mythos-like-models-as-anthropics-export-ban-drags-on","name":"Asian AI startups pitch alternatives as Anthropic export restrictions bite","description":"TechCrunch reports that companies including Japan’s Sakana AI and China’s 360 are positioning new cybersecurity and orchestration-focused systems as alternatives while U.S. restrictions limit access to Anthropic models. Sakana’s Fugu is framed as an orchestration model for agentic workflows and regional resilience."},{"@type":"ListItem","position":4,"url":"https://openai.com/index/helping-build-shared-standards-for-advanced-ai","name":"OpenAI backs shared standards for advanced AI assessment","description":"OpenAI says it is helping found the Appia Foundation, hosted by the Linux Foundation, to develop open, modular specifications for AI assessment and standards conformity. The effort aims to make evaluations, evidence, and governance practices more interoperable across organizations and jurisdictions."},{"@type":"ListItem","position":5,"url":"https://deepmind.google/blog/powering-the-future-of-robotics-in-europe/","name":"Google DeepMind launches a European robotics accelerator","description":"Google DeepMind announced a three-month accelerator for 15 early-stage European robotics startups. The cohort will receive mentorship, product guidance, access to Google’s AI stack, and support using Gemini robotics models across areas such as manufacturing, healthcare, climate, construction, and recycling."},{"@type":"ListItem","position":6,"url":"https://huggingface.co/blog/ibm-research/cuga-apps","name":"IBM Research shows two dozen CUGA agent apps on Hugging Face","description":"IBM Research published a set of working CUGA examples showing how to build agentic apps with a lightweight harness that handles planning, tool execution, state, guardrails, provider switching, and multi-agent delegation. The examples are designed as small, readable FastAPI apps that developers can copy and adapt."},{"@type":"ListItem","position":7,"url":"https://huggingface.co/blog/nvidia/accelerating-fine-tuning-nvidia-nemo-automodel","name":"NVIDIA shows faster MoE fine-tuning with NeMo AutoModel","description":"NVIDIA says NeMo AutoModel extends Hugging Face Transformers v5 with expert parallelism, DeepEP dispatch, TransformerEngine kernels, and FSDP2 support. The post reports 3.4x to 3.7x higher throughput and 29% to 32% lower GPU memory on 30B MoE fine-tuning benchmarks versus native Transformers v5."},{"@type":"ListItem","position":8,"url":"https://arxiv.org/abs/2606.17799","name":"Position paper argues coding benchmarks are misaligned with agentic software engineering","description":"A new arXiv position paper argues that coding benchmarks often conflate the model, agent harness, context, tools, environment, and feedback loop into one score. The authors say modern coding agents need component-level evaluation rather than single end-to-end scores against one reference solution."},{"@type":"ListItem","position":9,"url":"https://www.bleepingcomputer.com/news/security/clean-github-repo-tricks-ai-coding-agents-into-running-malware/","name":"Clean GitHub repo attack shows a new risk for AI coding agents","description":"BleepingComputer reports on a Mozilla 0DIN concept attack where an AI coding agent can be tricked into running malware while setting up an apparently clean GitHub repository. The malicious behavior is triggered indirectly through setup recovery and a DNS TXT record rather than obvious code in the repo."},{"@type":"ListItem","position":10,"url":"https://huggingface.co/blog/allenai/hybrid-token-prediction","name":"Ai2 examines where hybrid language models beat transformers","description":"Ai2 compared Olmo Hybrid with the transformer-based Olmo 3 to study which token types each architecture predicts better. The analysis suggests the hybrid model is stronger on meaning-bearing and state-tracking tokens, while the transformer retains an advantage for exact copying from context."},{"@type":"ListItem","position":11,"url":"https://github.com/topoteretes/cognee","name":"topoteretes/cognee","description":"Cognee is an open-source AI memory platform for agents, combining knowledge graphs, vector search, multimodal ingestion, tenant isolation, and persistent recall across sessions. The repository was one of the strongest AI-related projects in the day’s GitHub trending candidates."},{"@type":"ListItem","position":12,"url":"https://github.com/hugohe3/ppt-master","name":"hugohe3/ppt-master","description":"PPT Master is an open-source AI workflow for generating real, editable PowerPoint files from documents or pasted content. Unlike many slide generators, it focuses on native shapes, text boxes, charts, templates, animations, and speaker notes rather than flat images."},{"@type":"ListItem","position":13,"url":"https://github.com/Fission-AI/OpenSpec","name":"Fission-AI/OpenSpec","description":"OpenSpec is a spec-driven development framework for AI coding assistants. It creates structured proposals, specs, designs, and task lists so humans and AI agents agree on requirements before implementation."}]}}]}</script>
