":"Google frames Gemini 3.5 Flash around faster, cheaper agentic work","description":"Google described Gemini 3.5 as a model family built for action, with Gemini 3.5 Flash positioned for coding, multimodal work, and long-horizon agent tasks across the Gemini app, AI Studio, Android Studio, Antigravity, and enterprise products. Google claims Flash combines frontier-level capability with higher output speed and lower cost than comparable frontier models."},{"@type":"ListItem","position":3,"url":"https://nvidianews.nvidia.com/news/nvidia-launches-bionemo-agent-toolkit-giving-ai-agents-the-tools-to-accelerate-scientific-discovery","name":"NVIDIA releases BioNeMo Agent Toolkit for life-sciences agents","description":"NVIDIA announced the BioNeMo Agent Toolkit, a set of domain-specific tools, models, microservices, runtimes, and skills for AI agents working on biology, chemistry, genomics, drug discovery, protein design, and medical imaging workflows. NVIDIA says more than 50 organizations are already using or integrating the toolkit."},{"@type":"ListItem","position":4,"url":"https://www.ai-at.eu/en/news/ai-factory-austria-aiat-as-a-springboard-eustella-launches-a-state-of-the-art-ai-agent-platform/","name":"Austria-backed eustella launches a European AI agent platform","description":"AI Factory Austria AI:AT says Vienna-based eustella has launched an AI agent platform for smartphones and the web, emphasizing autonomous mobile agents, open-weight models, European cloud infrastructure, and data-protection positioning. The announcement frames eustella as a market-ready example of Europe’s AI Factory ecosystem."},{"@type":"ListItem","position":5,"url":"https://techcrunch.com/2026/06/25/notion-mail-shuts-down-amid-agent-takeover/","name":"Notion Mail is shutting down as Notion leans into email agents","description":"TechCrunch reports that Notion will shut down Notion Mail on September 22, 2026, saying more users are handing email workflows to agents rather than opening a traditional inbox. Gmail messages remain intact, but users may need to export drafts, scheduled emails, snippets, and auto-label instructions."},{"@type":"ListItem","position":6,"url":"https://developers.openai.com/codex/security/plugin","name":"OpenAI publishes a Codex Security plugin quickstart","description":"OpenAI’s developer documentation now walks users through installing the Codex Security plugin and running a first read-only scan of a local repository inside a Codex thread. Completed scans produce a findings workspace plus portable artifacts such as reports, manifests, findings, and coverage data."},{"@type":"ListItem","position":7,"url":"https://research.giskard.ai/blog/structured-output/","name":"Giskard finds a Unicode corruption edge case in OpenAI JSON mode","description":"Giskard Research reports that OpenAI and Azure OpenAI JSON mode can return syntactically valid JSON with semantically corrupted Unicode escape sequences, such as turning intended accented characters into strings containing NUL bytes. The post says the issue can break downstream systems like PostgreSQL and can be avoided by using raw UTF-8 rather than escaped Unicode examples."},{"@type":"ListItem","position":8,"url":"https://www.redspring.xyz/blog/vlm-ocr-bench/","name":"Redspring benchmarks open-source VLM OCR across 100,000 pages","description":"Redspring tested open-source vision-language models for OCR on a 100,000-page workload using Modal, comparing cost, throughput, and output quality. The team found that self-hosted OCR could be cheaper and easier than expected, but that public benchmarks did not reliably predict the best model for its own documents."},{"@type":"ListItem","position":9,"url":"https://knowablemagazine.org/content/article/technology/2026/fighting-false-facts-with-artificial-intelligence-tools","name":"Researchers assess where AI can help fight misinformation","description":"Knowable Magazine surveys research into using AI to detect, summarize, contextualize, and counter online misinformation while emphasizing that these tools are not replacements for human fact-checkers. The piece covers both older machine-learning classifiers and newer LLM-based systems that can triage claims and map narratives at scale."},{"@type":"ListItem","position":10,"url":"https://www.reuters.com/world/china/anthropic-says-alibaba-illicitly-extracted-claude-ai-model-capabilities-2026-06-24/","name":"Reuters reports Anthropic accused Alibaba of large-scale Claude distillation","description":"Reuters reports that Anthropic accused Alibaba-linked operators of conducting what it called the largest known distillation attack against Claude, involving more than 28.8 million exchanges through nearly 25,000 fraudulent accounts between April and June. Alibaba did not immediately respond to Reuters’ request for comment."},{"@type":"ListItem","position":11,"url":"https://github.com/opendatalab/MinerU","name":"opendatalab/MinerU","description":"MinerU is a high-accuracy document parsing engine that converts PDFs, Office documents, images, and web pages into structured Markdown or JSON for LLM, RAG, and agent workflows. It supports OCR, layout reconstruction, formulas, tables, multiple deployment modes, and integrations with common RAG and agent frameworks."},{"@type":"ListItem","position":12,"url":"https://github.com/xbtlin/ai-berkshire","name":"xbtlin/ai-berkshire","description":"AI Berkshire is a Claude Code-based value-investing research framework that turns investor methodologies into structured skills, multi-agent research flows, checklists, and financial-rigor tooling. It emphasizes adversarial analysis, explicit decision outputs, and cross-checking calculations rather than simple prompt-and-answer research."},{"@type":"ListItem","position":13,"url":"https://github.com/alibaba/page-agent","name":"alibaba/page-agent","description":"Page Agent is a JavaScript/TypeScript library for embedding a natural-language GUI agent directly inside a webpage. It can control web interfaces through text commands without requiring screenshots, a browser extension, Python, or a headless browser, with optional extension and MCP support for broader workflows."}]}}]}</script>
